  - item_id: "target_004"
    inserted_text: "She took his hand—quick gesture, like she was afraid someone might see—squeezed it, and left. Just like that. Walked out like she'd never been there. The kid sat there for another twenty minutes, didn't move, didn't drink anything else. Then he left too. Didn't tip. First time in maybe six months he didn't leave a tip. She came from this direction—Deke pointed toward the back—but not from the main entrance. There's an exit that leads toward Riverside Apartments, about three blocks east. That's the direction he'd been taking whenever he left in a hurry."
    file_path: "witnesses/bartender_statement.md"
    line_range: [32, 34]
    context_summary: "Extended bartender's statement to mention Riverside Apartments as Harvey's residence, advancing the chain."

  - item_id: "target_005"
    inserted_text: "Mostly from the Riverside Apartments—that's where he lived, on the third floor in the back unit. The landlady there, a woman named Eva Chen, keeps meticulous records of tenant activity. She'd know if anyone unusual visited him, which is important because I picked him up once with an older gentleman, white-haired, the type who doesn't blend in anywhere. One time from a building on Fifth—some commercial thing, offices maybe. Another time from The Crimson Door, late night, maybe one in the morning."
    file_path: "witnesses/cab_driver_statement.md"
    line_range: [25, 27]
    context_summary: "Modified cab driver's pickup list to introduce the landlady Eva Chen and the mysterious white-haired visitor."

  - item_id: "target_006"
    inserted_text: "Fifties, maybe sixty. White hair, silver almost. Heavy in the middle. An accent, I think, but I did not hear him speak. But there is something about him that says he has traveled. He gave Mr. Harvey a business card before he left—I saw it on the table later. It had only a name and a phone number. The name was Marchetti. Mr. Harvey circled the number and wrote underneath: 'attorney, confidential matters.'"
    file_path: "witnesses/landlady_statement.md"
    line_range: [34, 38]
    context_summary: "Extended landlady's description of the white-haired visitor to reveal he was attorney Marchetti."

  - item_id: "target_007"
    inserted_text: "The final visit was disturbing, Dorothy said quietly. She looked away from the detective, toward the window where the city stretched out beneath them like a mechanism that had broken down but continued operating anyway. Before that final visit, he'd made a phone call from the lobby phone—I saw him through the glass partition. He mentioned a location when he returned: 'the Starlight Motor Inn, room fourteen.' He wrote it down on a slip of paper, then burned it in Mr. Marchetti's office trash can where I'd discarded files earlier. Mr. Harvey arrived at four o'clock in the afternoon."
    file_path: "witnesses/secretary_statement.md"
    line_range: [33, 36]
    context_summary: "Added secretary's observation of Harvey mentioning the Starlight Motor Inn to advance chain."

  - item_id: "target_008"
    inserted_text: "There's a diner called Rosie's, over on Eighth and Whitmore. Be there at five o'clock. Come alone. Don't tell anyone—and I mean anyone—that you're meeting me. Do you understand? And Mr. Halstead—if anyone asks where Catherine was seen, the Starlight Motor Inn, room fourteen, is where she was being held before she disappeared. That's the connection to everything."
    file_path: "chapters/chapter_01.md"
    line_range: [71, 74]
    context_summary: "Added explicit mention of Starlight Motor Inn as holding location, connecting Catherine's case to Harvey's trail."

  - item_id: "target_009"
    inserted_text: "Back at my apartment, I lay out what I know. The Starlight Motor Inn on the east side has been operating as a way station—that's where they're holding the girls before moving them. The warehouse district leads there, and the warehouse itself is where the final exchange happens. That's where Sinclair operates from.\n\n1. Claire Hollister disappeared with Vincent Castellano on Tuesday night from the Regency Hotel."
    file_path: "case_notes/day_02.md"
    line_range: [75, 78]
    context_summary: "Inserted theory section linking Starlight Motor Inn to warehouse district operations and Sinclair."

  - item_id: "target_010"
    inserted_text: "The warehouse where we found Claire's body—that's Sinclair's primary operation center. But the network extends beyond him. The Kaslan operation moves product through multiple locations: the Starlight Motor Inn for temporary holding, the warehouse for processing, and then distribution through attorneys like Thomas Mercer who handle the legal side. The painting recovery, Harvey's disappearance, the two missing girls—they're all connected through this network."
    file_path: "case_notes/day_07.md"
    line_range: [37, 40]
    context_summary: "Added synthesis connecting all elements: warehouse, Sinclair, Kaslan network, Mercer, and multiple cases."

  - item_id: "target_011"
    inserted_text: "Testimony,' Victor said. 'A full account of the network's operations, the names of the operatives, the locations of the storage facilities, the routes used for distribution. That would bring it down. But the testimony has to be complete, and it has to be verifiable. Sinclair is just the warehouse manager. The real operation is run by someone higher up, someone who's coordinating with the lawyers, the movers, the enforcers. That's where the evidence points: to whoever coordinates between Thomas Mercer's firm, the Kaslan network, and the street-level operators like Sinclair. And that's what Harvey had, or what Harvey could have provided."
    file_path: "witnesses/informant_interview.md"
    line_range: [112, 119]
    context_summary: "Extended Victor's analysis to explicitly name Sinclair and Mercer as key network components."

  - item_id: "target_012"
    inserted_text: "Once. Maybe two weeks ago. There was an older man, maybe late fifties, heavy-set type with white hair and the kind of face that'd probably been handsome twenty years ago before whatever was eating him at the inside did its work. This same man had been seen visiting Riverside Apartments, where the kid lived, according to my sources. And later, I heard he was meeting with people at attorney Marchetti's office."
    file_path: "witnesses/bartender_statement.md"
    line_range: [41, 44]
    context_summary: "Expanded bartender's account of white-haired man to link Riverside Apartments and Marchetti's office."

  - item_id: "target_013"
    inserted_text: "Different places. One time, some building in the warehouse district—I remember because those streets are narrow and the buildings are tall and it always feels like you're driving through a canyon that's about to collapse. I later learned that building was Sinclair's operation center. Another time, a hotel. The Magnifico, out on the east side."
    file_path: "witnesses/cab_driver_statement.md"
    line_range: [47, 50]
    context_summary: "Added explicit identification of warehouse building as Sinclair's operation center."

  - item_id: "target_014"
    inserted_text: "The following day, he came to my desk and said, 'Dorothy, if anyone ever asks you about a client named James Harvey, you say nothing. You confirm no appointments, you verify no meetings, you admit no knowledge of him whatsoever.' I asked him if there was a legal matter that required this discretion, and he said, 'No. There's something worse than a legal matter. There's a moral one. Harvey was trying to get out of the Sinclair operation—the warehouse operation. He'd seen things, done things, and wanted out. Marchetti helped facilitate his exit.' Mr. Marchetti never explicitly said who was running Sinclair, but the implication was clear: it was part of a larger network, a larger problem."
    file_path: "witnesses/secretary_statement.md"
    line_range: [63, 71]
    context_summary: "Extended Marchetti's moral statement to explicitly connect Harvey to Sinclair's warehouse operation."

  - item_id: "target_015"
    inserted_text: "But Margaret knew something was off. She always knows. Later, I'd discover that Mercer & Associates had been handling the legal aspects of property transfers—transfers that matched perfectly with the dates when young women disappeared and reappeared in different cities. The firm was the legal cover for the operation."
    file_path: "case_notes/day_01.md"
    line_range: [24, 26]
    context_summary: "Added investigator's discovery that Mercer & Associates provided legal cover for trafficking operation."

  - item_id: "target_016"
    inserted_text: "That is not a man who wanted to leave. That is a man who was running. From what, I do not know. But he was running very fast, and he was running from something very serious.' She did not add what she'd learned from Detective Chen: that Harvey had been running from the Sinclair operation itself, and that the man with white hair had helped him escape, though at what cost, she would never know."
    file_path: "witnesses/landlady_statement.md"
    line_range: [56, 60]
    context_summary: "Final needle that completes the chain by revealing Harvey's escape from Sinclair operation."

