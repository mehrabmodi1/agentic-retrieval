    inserted_text: "*\"H and I visited the botanical gardens on Saturday afternoon. The chrysanthemums were in full bloom—orange and amber and a deep rust that matched the season. He was distracted, as he sometimes is, standing very still in front of a bed of flowers with his hands in his coat pockets. When he finally turned to me, the autumn light caught the left side of his face, and I noticed something I hadn't seen before: a narrow white scar, barely a centimeter long, that nicked the outer edge of his left eyebrow. Healed for years, you could tell—the skin there had a different texture, a small ridge. He caught me looking and touched the spot instinctively, then dropped his hand. 'Don't,' he said. Not unkindly. Just quietly. He didn't want me asking about it. I thought: every person carries their own atlas of scars. His just happens to be mostly hidden.\"*"
