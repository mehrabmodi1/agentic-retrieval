expected_answers:
  question: "Using all witness accounts, investigative notes, and financial records, explain how the three criminal networks (the Kaslan art distribution operation, Meridian Holdings' corporate infrastructure, and the Castellano family organization) converged to create the kidnapping of Catherine Halstead. What specific decision by James Harvey triggered the crisis, who facilitated his escape, what was the deadline for his departure, and what financial and behavioral evidence proves the involvement of all parties?"

  correctness: "A complete answer must identify: (1) the Kaslan art theft network and Harvey's role as a facilitator; (2) his moral crisis regarding the fifteenth-century painting stolen from Vesper's widow; (3) his October 28th legal consultation with Marchetti about voluntary disclosure; (4) Meridian Holdings as the organization behind Catherine's kidnapping; (5) Silas Gregg as the operative handler who offered escape; (6) the Starlight Motor Inn room 14 as the safe house location; (7) the November 6th deadline for Harvey's decision; (8) $50,000 in travel funds and documents provided by Gregg; (9) Margot as the negotiator facilitating Harvey's exit through the Kaslan organization; (10) the $175,000 in suspicious payments from Margaret Hollister's accounts to Meridian Holdings shell corporations between October 2-28; (11) Detective Webb's secret cooperation with prosecutors regarding Meridian Holdings; (12) Thomas Mercer's knowledge of the Castellano organization's use of the Regency Hotel; (13) Claire Hollister's death as Meridian's retaliation; (14) the timeline correlation between Harvey's escalating legal crisis and Catherine's disappearance and tracking; (15) the connection between Harvey's anticipated testimony against Kaslan and Catherine's kidnapping as leverage; (16) Catherine's awareness through her mysterious lover Harvey of his involvement in both the art theft network and the larger conspiracy."

  completeness: "A complete answer synthesizes information from all 16 sources to construct: (A) a coherent timeline spanning September 8th through November 6th showing the progression from Harvey's initial legal consultation to his organized escape; (B) the organizational structure linking Kaslan (art theft), Meridian Holdings (corporate cover), and Castellano (enforcement); (C) the trigger event (Harvey's conscience regarding the Vesper painting) that set the kidnapping in motion; (D) the specific escape mechanism (Motor Inn reservation, travel documents, $50K payment, November deadline); (E) the financial evidence ($175K transfers during the critical period); (F) the behavioral observations (Harvey's deterioration, moving boxes, train reservation, Catherine's final warning about danger); (G) the connecting individuals (Gregg as handler, Margot as negotiator, Webb as turncoat police officer, Mercer as legal/organizational insider); (H) the dual victimization pattern (Claire Hollister's murder serving as warning while Catherine's kidnapping served as leverage); (I) the broader criminal conspiracy spanning multiple networks and city institutions. The answer must demonstrate comprehension of how each piece of information, when combined with all others, reveals a complex web of criminal coordination, moral compromise, and institutional corruption."

