    inserted_text: "Before I stood up, I checked the waste basket beside Catherine's desk—habit more than hope. Mostly what you find in waste baskets are the things people almost said, the drafts that didn't survive the gap between feeling and articulation. There was a crumpled bank envelope, a torn magazine page about an art exhibition, and, at the very bottom, a small envelope that had been opened carefully and then folded twice. I unfolded it. Inside was a card on cream-colored hotel stationery, heavy stock, from somewhere called the Emerson Club. On the back, in fountain pen: *Whatever happens next, none of it is your fault. I'm sorry I couldn't keep you out of this. —H.* The date written in the upper corner was October 28th—three days before Catherine disappeared."
