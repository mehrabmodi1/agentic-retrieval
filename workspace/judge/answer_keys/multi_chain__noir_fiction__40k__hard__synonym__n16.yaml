  - item_id: "target_016"
    inserted_text: "Catherine Halstead is found safe. She'd been held in a secure room at Oak Hill—not in danger, but as living insurance against investigation. When police breach the vault, they find her there, frightened but unharmed. She's able to provide testimony about everything she saw: the paintings, the ledger, the names in the documentation. Her father's mysterious business associate 'H' was James Harvey, and his decision to cooperate with authorities and orchestrate the recovery of the Vesper painting was his way of protecting Catherine and dismantling the network that had placed her in danger. The ledger at Oak Hill—hidden in the false panel on the third shelf, left corner, exactly where Harvey said it would be—becomes the centerpiece of the prosecution. Every stolen artwork can now be traced. Every name in the operation can now be prosecuted. Every location where art was stored or moved can now be secured."
