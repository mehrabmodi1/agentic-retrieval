  - item_id: "target_005"
    inserted_text: "I ask him about the crates that Sinclair moves from the warehouse. Paulie looks around and leans in close. Those are art shipments. I've handled the paperwork. They come from the Castellano network and get transported to a private address—somewhere in the residential district. I think it's Oak Hill, but I'm not sure exactly where. All I know is that whoever owns that place, they've got serious money and serious protection. Cops don't ask questions about it. City officials avoid it. The place is a fortress, and whatever goes there doesn't come back out again."
