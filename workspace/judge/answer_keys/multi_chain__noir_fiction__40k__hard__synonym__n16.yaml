    context_summary: "Halstead confirms Oak Hill vault location and Catherine's dangerous knowledge of underground art collection."
    next_reference: "third shelf left corner vault"

  - item_id: "target_011"
    inserted_text: "Catherine was dating someone, Eleanor said finally. She's been seeing him for a few months. She was very secretive about it, wouldn't tell us his name or much about him. But she was happy about it. We assumed it was going somewhere serious. That was the kind of detail that changed everything. A secret boyfriend was either completely innocent or the key to the entire puzzle. Do any of you know who this man is? Susan exchanged a glance with the others. We heard his friends call him 'H' once. He took Catherine to some kind of private showing—artwork, she said, though she wouldn't tell us where. She mentioned it was 'beneath the public eye, stored away, worth a fortune.' She said the man took her down into a vault and showed her paintings. She seemed both impressed and frightened. She said, 'He showed me where everything of value gets kept. He showed me his world, and it's not the world I thought he lived in.' After that, she became distant, worried. She knew too much about that basement on Oak Hill."
    file_path: "chapters/chapter_03.md"
    line_range: [33, 37]
    context_summary: "Friends reveal Catherine was shown underground vault containing stolen paintings by mysterious man 'H'."
    next_reference: "false panel in vault"

  - item_id: "target_012"
    inserted_text: "Then, about three weeks ago, something shifted. The entries became worried. H is different lately. Distracted. When I ask him what's wrong, he changes the subject or holds me without answering. I think something is happening in his business. Something serious. But he won't tell me what it is. He says it's better if I don't know. Says it's to protect me. But it feels like being kept in the dark. How can I help him if I don't understand what's happening? He took me to Oak Hill today, to the vault again. He was frantic, checking things, moving things. He showed me a painting—a fifteenth-century piece, he said. It belonged to a banker's widow, he told me. He said he'd made a terrible mistake being involved with taking it. He said if anything happened to him, I should know that the painting is hidden in a false panel behind the main storage shelves. He made me memorize the location: third shelf, left corner, beneath the portrait of a woman in blue."
    file_path: "chapters/chapter_04.md"
    line_range: [23, 26]
