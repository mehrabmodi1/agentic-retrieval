  - item_id: "target_007"
    inserted_text: "Chen notices the address written on Mercer's note. Oak Hill, seventeen, he reads aloud. That's interesting. I've been trying to find out who owns that property for months. It's registered to a corporation that doesn't officially exist—on paper, yes, but no real operations. Whatever happens at that address stays private. But I have a source who says that's where the serious stolen art gets stored before international shipment. If you want proof of what Sinclair's operation really is, that's where you'll find it."
