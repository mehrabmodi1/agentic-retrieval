  - item_id: "target_013"
    inserted_text: "In exchange for what? The painting? Let me be clear on the details: the Vesper painting—the fifteenth-century work stolen from Carl Vesper's widow—has been stored in a climate-controlled vault at Oak Hill, location seventeen. That's our missing piece. That vault is where Catherine Halstead was photographed by Sinclair's people, using her as leverage against her father. That vault is where the entire operation's value resides. If Harvey wanted to secure safe passage, he would have needed to arrange for that painting to be recovered and returned, breaking the network's insurance policy. The painting wasn't just an artwork. It was collateral. It was leverage. And it became Harvey's bargaining chip."
    file_path: "witnesses/detective_debrief.md"
    line_range: [46, 48]
    context_summary: "Police debrief connects Vesper painting to Harvey's negotiated escape plan and network leverage system."
    next_reference: "painting returned to library steps"

  - item_id: "target_014"
    inserted_text: "That's the interesting part, Victor said, and for the first time there was something like satisfaction in his voice. The painting was recovered. Three days ago, it was found leaning against the steps of the public library downtown. It was wrapped in museum-quality archival cloth, secured with cord—the kind of care a professional conservator would use. There was a note attached that said, 'Property of the Vesper Estate. Return to family of Carl Vesper with apologies. This painting came from the vault at Oak Hill, location seventeen, where many other stolen works are being held. All records of its location and condition are catalogued in a leather-bound ledger hidden beneath the false panel on the third shelf, left corner, where the painting itself was stored. That ledger contains the names, locations, and values of every stolen artwork in the network. It also contains the truth about what happened to Sinclair's other leverage—the girl named Catherine who was photographed there.' No signature. But here's what's significant: the handwriting on the note—precise, educated, meticulous—matches samples of Harvey's writing that we recovered from his apartment. Harvey didn't just secure his own escape. He buried the entire operation by recovering the painting and revealing the ledger's location."
    file_path: "witnesses/informant_interview.md"
    line_range: [66, 70]
    context_summary: "Informant reports Vesper painting recovery with note revealing hidden ledger location in third shelf false panel."
