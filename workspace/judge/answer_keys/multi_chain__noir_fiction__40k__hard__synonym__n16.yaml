    line_range: [42, 43]
    context_summary: "Bartender overhears instruction to retrieve Vesper painting as escape condition."
    next_reference: "Vesper painting recovery"

  - item_id: "target_009"
    inserted_text: "A package arrived this morning. No postage, no return address. Just left on the front step. Another pause. It contained a photograph. It was Catherine, but... she was frightened. There was a note. The note said: 'Your daughter has been photographed in the storage facility where expensive things are kept. The facility is beneath the earth, guarded and secret. If you want her back alive, you need to understand what she learned about the older man. He visits a place on Oak Hill regularly. That's where the art collection stays—stolen, valuable, and absolutely essential to his operation. Your daughter is collateral because she knows about his connections to that place.'"
