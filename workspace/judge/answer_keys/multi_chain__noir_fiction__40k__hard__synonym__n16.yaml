  - item_id: "target_004"
    inserted_text: "The cellar stairs are not hard to find—they're behind the kitchen, locked with a chain. Sylvia sees me looking at them and smiles. That's where they keep the really expensive inventory. The Castellanos and their friends. I don't go down there. Not my business. But I know that Sinclair's been down there every Wednesday at midnight, collecting things or moving them. There's always a car waiting outside, engine running, during those visits. Sometimes he comes out carrying small crates, wrapped carefully like they contain something that shouldn't see daylight."
