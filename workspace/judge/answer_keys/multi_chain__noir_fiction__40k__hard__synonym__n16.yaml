  - item_id: "target_006"
    inserted_text: "He pauses, then adds in a voice barely above a whisper: And inside the envelope, you'll find something else—a note with an address. Oak Hill address, number seventeen. That's where they keep the valuable pieces. The paintings, the sculptures, the things that were stolen from people who had more sentimental value for them than market value. One of those pieces came from the widow of a banker named Vesper. That painting has been their leverage for years."
