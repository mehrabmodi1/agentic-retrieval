    next_reference: "underground vault beneath Oak Hill"

  - item_id: "target_010"
    inserted_text: "You have to find her before they contact me again. You have to find her before they ask for something I can't give them. The men I've dealt with—they're not acting independently. There's a structure, a hierarchy. Someone above Sinclair, someone orchestrating these operations. Someone who makes decisions that people like Sinclair execute. That's the real power in this city. And that power lives in a house on Oak Hill—number seventeen—where the stolen art is kept in a climate-controlled vault beneath the main residence. That's what Catherine saw. That's what got her taken. Someone photographed her inside that vault, standing in front of paintings that have been missing from museums and family estates for years."
