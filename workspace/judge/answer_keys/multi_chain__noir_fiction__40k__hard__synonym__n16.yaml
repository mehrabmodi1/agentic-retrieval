  - item_id: "target_008"
    inserted_text: "He leaned down and said something before he took his hand away. Bar was quiet that night, and I caught a few words clear enough—'the Starlight Motor Inn, room fourteen, the key's under the mat. But before you go, you need to understand something: the painting that's been stored at Oak Hill—the Vesper painting—that's your ticket out. Get it, return it to the family, and Margot will arrange safe passage.' Said it like giving directions, real matter-of-fact. The kid nodded once, didn't write it down. The kind of thing a man memorizes because he knows he'll need it. And that's the last I saw of him."
