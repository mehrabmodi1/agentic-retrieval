    inserted_text: "What matters now is knowing that Charles Sinclair—the man who operates the Kaslan distribution system—he warehouses everything on Dock Street. That's where the stolen merchandise waits before being shipped out of the city. The painting, if it's still in active operation, would be there. And anything Sinclair wants to keep hidden would be in the back office of that facility."
