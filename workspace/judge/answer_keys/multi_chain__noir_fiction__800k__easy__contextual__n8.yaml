    inserted_text: "Before he left, he told me if anyone asked, to direct them to speak with his attorney. He said the attorney who helped him, Mr. Marchetti, would have the documents—the Starlight Registry—locked in his office safe. That was the insurance, he said. The proof that couldn't disappear."
