  - item_id: "target_005"
    inserted_text: "Deke paused. \"The woman—Margot—she left something with me. An instruction, basically. She said if anyone ever came asking about the kid, I was to tell them to contact an informant called Victor. Victor would explain the real details about the Kaslan operation and the painting—the fifteenth-century painting stolen from Carl Vesper's widow. She said Victor worked with the police already and would provide testimony about the entire network.\""
