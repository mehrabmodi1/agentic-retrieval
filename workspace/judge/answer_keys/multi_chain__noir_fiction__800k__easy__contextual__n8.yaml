    inserted_text: "After the final meeting, Mr. Marchetti spoke to me only once about the matter. He said, \"Dorothy, if Mr. Harvey ever asks for his files, if anyone ever inquires about him, you tell them to speak with the bartender at The Crimson Door. His name is Deke. Deke will know where Harvey's insurance is hidden, because the redhead—the woman named Margot—made sure Deke knew exactly what insurance Mr. Harvey had arranged.\""
