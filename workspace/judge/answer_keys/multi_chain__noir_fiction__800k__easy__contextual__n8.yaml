    line_range: [28, 31]
    context_summary: "Victor reveals that Sinclair operates the Kaslan system from a warehouse on Dock Street, where stolen merchandise and evidence are stored in the back office."

  - item_id: "target_007"
    inserted_text: "I finally find what I'm looking for in an old newspaper article from three years ago. A story about a shipping magnate named Victor Ashford. Ashford supposedly controls most of the import business coming into the city, though the article is careful to note that this is merely alleged.\n\nBut the article mentions someone working with Ashford: a man named Charles Sinclair, described as Ashford's \"financial advisor and representative.\"\n\nThat's the name. Charles Sinclair. The same name on the car registration. The same man who's been visiting me and threatening me and moving girls into warehouses. The article also includes a business address—a warehouse facility on Dock Street in the harbor district. That's where Sinclair operates his real business, the article hints. And if Harvey's evidence exists anywhere, if the painting was brought somewhere for storage or evaluation, that warehouse would be the logical location. Everything points to Dock Street."
    file_path: "case_notes/day_04.md"
    line_range: [88, 93]
    context_summary: "The detective confirms Sinclair's Dock Street warehouse address from newspaper records, identifying it as the operational location for the entire network."

  - item_id: "target_008"
    inserted_text: "The inside of the warehouse is what you'd expect: rows of crates, the smell of import and possibility, the sense of a place designed to move things across borders without too many questions. I know the back office contains the records—transaction logs, payment documentation, shipment manifests, and storage inventories. The climate-controlled room holds the merchandise: the fifteenth-century painting from the Vesper estate, other stolen antiquities, all the evidence of Kaslan's operations waiting to be distributed internationally."
    file_path: "case_notes/day_05.md"
