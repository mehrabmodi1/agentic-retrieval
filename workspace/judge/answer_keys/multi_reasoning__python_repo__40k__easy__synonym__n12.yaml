expected_answers:
  question: "Given a system with 4 workers polling every 2 seconds, an HTTP request timeout of 30 seconds, API rate limit of 1000 requests per 60-second window, task retry backoff of 1.5x multiplier (max 128 seconds), report generation timeout of 300 seconds, pagination limited to 50 items per page, session timeout of 86400 seconds, UTC timestamp requirements, API key rotation every 90 days, complete audit logging requirement, and task title maximum length of 500 characters: if a report generation task requires 250 seconds to complete and fails on the first attempt, triggering exponential backoff retry, will the system successfully complete the task within safe operational bounds? Identify which constraint becomes the critical bottleneck and explain the constraint interaction."
  correctness: "Correct answer must identify that the 300-second report generation timeout is the primary constraint that will be violated, since the task requires 250 seconds + additional time for retries. The answer must explain that when the first attempt fails after 250 seconds and enters exponential backoff (starting at 2 seconds base with 1.5x multiplier), the retried task will exceed the 300-second limit. The answer should also recognize how the 4 workers/2-second polling and 30-second request timeout interact to limit concurrent task processing. Additionally, the answer must note that the 1000 requests per 60-second rate limit means at most ~16.67 requests per second, which constrains how quickly the system can process audit log writes (compliance requirement) and retry scheduling logic."
  completeness: "A complete answer must address: (1) The report timeout constraint and its interaction with task execution time, (2) The exponential backoff retry parameters and whether they can fit within the 300-second window, (3) How the 4 workers with 2-second polling limits concurrent task capacity, (4) The 30-second HTTP timeout constraint and its effect on individual request handling, (5) The 1000/60s rate limit and its effect on system throughput when combined with complete audit logging requirements, (6) Why the 86400-second session timeout is not the bottleneck in this scenario, (7) The interaction between pagination (50 items) and audit logging overhead. The answer should demonstrate that removing or changing any of these 12 values would alter the bottleneck analysis."
