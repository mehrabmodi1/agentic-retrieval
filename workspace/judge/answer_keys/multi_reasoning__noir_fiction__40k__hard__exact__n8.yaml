items:
  - item_id: "target_001"
    inserted_text: "But here's the thing I learned later—Harwick Falls has the Northwood Inn, a fishing lodge that was about to hire seasonal staff. The kind of place where a man with legitimate credentials could disappear into legitimate work. The application would have been processed weeks earlier, paperwork filed, housing arranged. Someone arranged everything perfectly."
    file_path: "witnesses/cab_driver_statement.md"
    line_range: [64, 66]
    context_summary: "Cab driver reveals that Harvey's destination, Harwick Falls, was arranged with legitimate employment at a fishing lodge."

  - item_id: "target_002"
    inserted_text: "What I didn't mention is the mechanism—Margot had access to Kaslan's offshore accounts. She moved Harvey's exit fee through three countries, transforming it into legitimate travel funds and deposit accounts in Canadian banks. Ten thousand dollars, enough to establish him safely while he settled into his new identity. She took a considerable personal risk, which suggests either leverage or something deeper. But the money trail proves she enabled the escape—not through sentiment, but through operational expertise."
    file_path: "witnesses/informant_interview.md"
    line_range: [84, 89]
    context_summary: "Informant Victor reveals that Margot facilitated Harvey's escape by moving exit fees through offshore accounts and Canadian banks."

  - item_id: "target_003"
    inserted_text: "But that wasn't the only visitor that night who left instructions. The redhead, when she came by his table, she wasn't just saying goodbye. She was giving him something—a small piece of paper she slipped into his hand while they touched. I saw it. She leaned close and whispered—I caught fragments: 'travel papers,' 'Canadian consulate has the documentation,' 'they're expecting you October 31st.' Cold as ice, she was. Professional. But he kept that piece of paper like it was his life, because it probably was."
    file_path: "witnesses/bartender_statement.md"
    line_range: [41, 49]
    context_summary: "Bartender Deke reports that the redhead (Margot) provided Harvey with travel documentation and Canadian consulate information."

  - item_id: "target_004"
    inserted_text: "However, I should note that the Canadian consulate has already been contacted by federal liaison agents. They report that Harvey's travel documents were processed through normal channels—legitimate visa application approved October 28th, travel documents issued October 29th. All paperwork suggests he intended to take employment with a fishing lodge enterprise. The federal angles are already coordinating with Canadian authorities, which suggests institutional cooperation rather than standard law enforcement cooperation."
    file_path: "witnesses/detective_debrief.md"
    line_range: [76, 79]
    context_summary: "Detective Halloway notes federal coordination confirming Harvey's legitimate travel documents and visa processing."

  - item_id: "target_005"
    inserted_text: "In his final meeting on October 28th—less than forty-eight hours before Harvey's departure—Mr. Marchetti provided what law enforcement has reconstructed to be legal documentation for Harvey's Canadian entry, including affidavits of good character prepared by third parties, employment verification letters from the Northwood Inn, and travel authorization documents that established Harvey as a legitimate worker rather than a fugitive. These documents proved essential to Harvey's successful crossing into Canada without triggering law enforcement alerts."
    file_path: "witnesses/secretary_statement.md"
    line_range: [73, 79]
    context_summary: "Detective Morello's notes reveal that attorney Marchetti provided essential legal documentation for Harvey's Canadian entry."

  - item_id: "target_006"
    inserted_text: "What I didn't tell the detective—I found something after he left, caught in the mail slot downstairs. A Canadian passport, brand new, in a different name. I could tell by the cover and the maple leaf. But the photograph inside, I only saw it briefly. It was Mr. Harvey, but different. Older. Like he had aged years in just weeks. Someone had given him that passport—I assume the man with the silver hair—and it changed everything for him."
    file_path: "witnesses/landlady_statement.md"
    line_range: [48, 54]
    context_summary: "Landlady Eva found evidence that Silas Gregg provided Harvey with a Canadian passport under an assumed identity."

  - item_id: "target_007"
    inserted_text: "Eleanor paused, and her knitting needles continued their familiar rhythm. \"What I should also mention, though it may not matter now: The previous afternoon, around two o'clock, the boy had a telephone call. He was in his apartment, and I could hear him through the wall—just his voice, not words exactly, but the tone changed entirely. He said, 'Yes, I received the information. Harwick Falls, the lodge, employment secured. Yes, I understand. October 30th, morning departure. Thank you.' He hung up, and I heard him sit down heavily, as though a terrible burden had been lifted. That telephone call was his confirmation. Someone had verified that the entire arrangement—the job, the location, the legal documentation—was real and waiting.\""
    file_path: "witnesses/neighbor_statement.md"
    line_range: [79, 91]
    context_summary: "Eleanor Pembroke overheard Harvey receiving confirmation that all escape arrangements were finalized and operational."

  - item_id: "target_008"
    inserted_text: "But I also do something else. I write a letter to be delivered to a young man named James Harvey, care of the Northwood Inn, Harwick Falls, with instructions to Helen that this letter should reach him if any move is made against me or my investigation. The letter explains that if I disappear, he's to contact law enforcement and provide his testimony about the Kaslan operation. It's insurance for both of us—it ensures Harvey knows that his cooperation is still valuable, and it ensures that if I fall, his story won't die with me. Helen stores this sealed letter separately, with different instructions, different timing."
    file_path: "case_notes/day_05.md"
    line_range: [34, 44]
    context_summary: "Jack Shepherd creates an insurance policy by sending a sealed letter to Harvey at his final destination, ensuring mutual protection."

expected_answers:
  question: |
    Based on all available witness statements and investigative notes, construct the complete mechanism through which James Harvey successfully escaped from the Kaslan operation. Your answer must identify: (1) the person who provided legitimate employment documentation, (2) the intermediary who facilitated financial arrangements, (3) the specific destination Harvey was traveling to, (4) the person who provided identity documents, (5) the type of travel authorization used, (6) confirmation that federal agencies were coordinating on Harvey's exit, and (7) what guarantee was established to ensure Harvey's continued silence and cooperation.

  correctness: |
    A correct answer must include all seven elements:
    1. Robert Marchetti, attorney, provided legal documentation including affidavits and employment verification
    2. Margot, Kaslan's acquisition specialist, moved exit funds through offshore accounts into Canadian banks
    3. The Northwood Inn fishing lodge in Harwick Falls, with legitimate employment arranged in advance
    4. Silas Gregg provided a Canadian passport under an assumed identity
    5. Legitimate Canadian visa and travel documents processed through official channels, approved October 28-29
    6. Federal liaison agents coordinating with Canadian consulate confirming legitimate visa processing
    7. Jack Shepherd's sealed letter sent to Harvey at Harwick Falls as mutual insurance ensuring continued cooperation

  completeness: |
    A complete answer must demonstrate that the user found and synthesized information from all eight witness statements and case notes, understanding how each piece (employment setup, financial facilitation, travel documents, identity documentation, federal coordination, and mutual insurance) combined to enable Harvey's successful escape while maintaining his value as a potential witness against both the Kaslan operation and other criminal enterprises in the city.

