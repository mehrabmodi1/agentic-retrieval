  inserted_text: Unless she was telling him something his superiors wanted him to know. Someone like Silas Gregg doesn't operate independently—there's always someone above him giving orders. Gregg was the enforcer, the handler who ensured compliance. But who was Gregg working for? That's where we find whoever is actually running things.
