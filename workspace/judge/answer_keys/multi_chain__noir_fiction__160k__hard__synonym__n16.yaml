  inserted_text: The pages that followed were blank, but I understood. Catherine Halstead was not just a victim of a random kidnapping. She was connected to someone inside the criminal network—someone who had wanted to get out, just like Harvey. Her disappearance was no accident. It was leverage, a way to keep H in line. The note in the kidnapping package—"Don't call the police"—made sense only if the kidnappers wanted H to remain silent.
