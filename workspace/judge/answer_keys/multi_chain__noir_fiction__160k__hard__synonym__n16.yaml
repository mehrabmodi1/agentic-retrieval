  inserted_text: 'But before she left, I understood something crucial: she wasn''t running things either. Diana Harrow was like Sinclair—a tool of Meridian Holdings. And Meridian Holdings answered to someone. The investigation had reached its final destination: understanding the mechanics of the city''s machinery itself, the way it crushed people and reconstructed society according to rules nobody could see.'
  file_path: chapters/chapter_05.md
  line_range:
  - 91
  - 98
  context_summary: Inserted after declining Diana's job offer, establishing that Meridian Holdings itself answers to unseen powers.
- item_id: target_016
  inserted_text: 'The investigation has shown me that Sinclair answers to Meridian Holdings, which answers to people whose names I''ll never know. The city isn''t run by the Castellano family or even by Sinclair. It''s run by something much larger—a machinery of corporate entities, hidden ownership structures registered in Delaware, boards of directors that exist only on paper, and people like Diana Harrow who carry out orders while keeping their own identities concealed. That is the final truth: the real power in the city operates through layers of indirection. Sinclair was just the visible face. The true answer to who controls the city is nobody. The machinery runs itself.'
  file_path: case_notes/day_08.md
