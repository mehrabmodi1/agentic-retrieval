- item_id: target_012
  inserted_text: There was the man. The one I mentioned. He came several times, maybe four times in the last few months. Always between eight and midnight. Always took the stairs, never the elevator—like he didn't want to be seen. The boy, he was clearly afraid of this man, but he also seemed to respect him. Like the man represented something important, someone important. That man was definitely connected to whatever was eating the boy from inside. That man represented the people above the local criminals, the ones with real power. And when the boy finally left, he left because that man told him to leave, or allowed him to leave, or arranged for his leaving.
  file_path: witnesses/landlady_statement.md
  line_range:
