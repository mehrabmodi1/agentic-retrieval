  inserted_text: He hesitated, and I realized that question had more weight than he wanted to admit. "Real estate," he said. "Development, mostly. Large projects that require coordination with city officials, with planning boards, with people who have the authority to approve or deny projects worth millions of dollars." In other words, his business required him to operate at the interface between legitimate money and the kind of money that didn't ask questions. And Catherine being taken meant someone wanted to ensure he remained cooperative, that he continued to funnel what needed to be funneled. The hierarchy above the Castellano family wasn't just a rumor—it was a system where men like Halstead, and lawyers like Mercer, and facilitators like Harvey, all played their assigned roles.
