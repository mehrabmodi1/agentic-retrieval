  inserted_text: The ransom didn't ask for money. That meant they wanted something else—compliance, silence, or leverage over someone. Halstead himself was involved in business dealings that required "paying off city officials," suggesting he was part of the same system that took his daughter. There was a hierarchy above the Castellano family, Halstead had mentioned. And Catherine's kidnapping was meant to control someone inside that hierarchy.
