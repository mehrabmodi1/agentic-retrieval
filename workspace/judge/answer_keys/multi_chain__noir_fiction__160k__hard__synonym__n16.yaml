- item_id: target_010
  inserted_text: 'But I would later learn that Catherine''s secret boyfriend—"H" from her journal—was exactly the kind of person the city''s machinery used and discarded. He was a facilitator like Harvey, someone with access to shipping networks and dock facilities. He had met Catherine and wanted out. Her kidnapping was the mechanism used to keep him from leaving, to keep him obedient to Sinclair. But there was another layer to this investigation: the detective debrief sessions that consolidated what we knew about the network''s structure.'
