    inserted_text: "But something nags at me about this detail—the careful observation, the professional manner. The kind of training you see in men who operate outside normal society. I make a note: possibly related to David Chen's investigation into the Hollister family art connections—a stolen Rembrandt that the reporter's been tracking for months."
