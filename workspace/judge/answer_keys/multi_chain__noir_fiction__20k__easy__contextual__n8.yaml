    inserted_text: "\"There was a red-haired woman,\" I press. \"She might have been present when things went wrong. At the Paradise, or connected to whoever brought the girl in.\"\n\nSylvia's hands stop moving. \"The redhead. That's a whole different story. But you need to talk to Patricia at Saint Michael's first. She'll tell you who came to pick Vincent up. And that'll lead you to the woman.\""
