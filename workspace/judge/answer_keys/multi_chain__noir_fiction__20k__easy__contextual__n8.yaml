  - item_id: "target_006"
    inserted_text: "Helen tells me that David Chen is accelerating his story. It's going to run in two days, not two weeks. It's going to expose Ashford, Sinclair, and the money laundering operation. It's going to force the authorities to take action.\n\nChen says he's had a breakthrough. Someone finally willing to talk. A former Sinclair employee who's decided that loyalty's less valuable than truth. Helen describes her briefly—red hair, elegant, the kind of woman who seems comfortable operating at the edges of criminal networks.\n\nThis person has also given Chen something else: the location of Claire Hollister's body. She told Chen that she'd been present when the decision was made to dispose of the girl, and she'd finally decided she couldn't live with knowing where they put her and saying nothing."
    file_path: "case_notes/day_06.md"
    line_range: [144, 148]
    context_summary: "Helen reveals that a red-haired woman is Chen's breakthrough source providing the body location and testimony."

