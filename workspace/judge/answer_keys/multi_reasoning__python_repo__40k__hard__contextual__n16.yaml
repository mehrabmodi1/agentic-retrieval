expected_answers:
  question: 'Calculate the theoretical maximum hourly throughput (in requests) for the entire system by combining:

    (1) rate limiting constraints per endpoint

    (2) database connection limits

    (3) worker thread availability

    (4) task processing weights

    (5) pagination item limits

    (6) cleanup batch processing

    (7) email bulk processing capacity

    (8) report row limits

    (9) sync interval constraints

    (10) retry queue capacity

    (11) error timeout windows

    (12) response buffer sizing

    (13) task retry policy

    (14) sync batch configuration

    (15) task weight multipliers

    (16) concurrent endpoint slot allocation.


    Show your work: identify each constraint, explain how it affects throughput, and calculate the bottleneck.

    '
  correctness: 'Answer must correctly extract and identify all 16 constraint values from their embedded contexts.

    Values must be understood in their system role (rate limit = 100 req/hr per endpoint,

    db connections = 32 max, workers = 16, task weight = 4 units, pagination = 100 items,

    cleanup batch = 1000, emails = 50/batch, rows/report = 10000, sync = 300s interval,

    retry queue = 2000, timeout = 30000ms, buffer = 256, retries = 3, batch = 100,

    weight = 4, slots = 8).

    '
  completeness: 'Complete answer must:

    - Locate all 16 needles across separate files (api, workers, tests modules)

    - Understand each constraint''s role in the system pipeline

    - Combine constraints accounting for interdependencies (e.g., worker threads limit task parallelism)

    - Calculate bottleneck: min(requests/hr achievable by all constraints)

    - Show reasoning that connects constraints: endpoint slots → database connections → worker threads → task weights → throughput

    - Account for batch processing (50 emails, 1000 cleanup records) in capacity calculation

    - Note timing constraints (300s sync interval, 30s error timeout, 3600s rate window)

    '
