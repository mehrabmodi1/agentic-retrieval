  question: The organization creation endpoint in `api/routes.md` references an outbound webhook mechanism for notifying integration partners. Following the chain of module and constant references that defines the ceiling for webhook delivery retry delays, what numerical value (in seconds) does the chain ultimately resolve to?
  correctness: The answer must be 7200 (seconds). This is the default value of RATE_CEILING_VALUE defined in app/config.md, which is the terminal value of the 8-link configuration chain starting from the webhook dispatch comment in api/routes.md.
  completeness: 'A complete answer traces the full chain: (1) api/routes.md create_organization mentions WebhookNotifier in app.services; (2) app/services.md WebhookNotifier docstring mentions ''webhook_delivery'' policy ceiling in workers.retry_handler; (3) workers/retry_handler.md __main__ block mentions RECOVERY_WINDOW_CAP from app.api.error_handlers; (4) api/error_handlers.md defines RECOVERY_WINDOW_CAP mirroring DEFAULT_TIMEOUT_CAP from app.api.rate_limiting; (5) api/rate_limiting.md defines DEFAULT_TIMEOUT_CAP from RATE_CEILING_VALUE referencing app.api.serializers; (6) api/serializers.md RateLimitResponseSchema mentions window_ceiling_secs validated in tests.test_api; (7) tests/test_api.md TestRateLimitResponses imports RATE_CEILING_VALUE from app.config; (8) app/config.md defines RATE_CEILING_VALUE with default 7200.'
