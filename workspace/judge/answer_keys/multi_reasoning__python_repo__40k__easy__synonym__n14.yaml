expected_answers:
  question: 'The system contains 14 numeric configuration parameters distributed across
    different operational components (email delivery, task synchronization, API management,
    authentication, request handling, data cleanup, and task execution). These parameters
    define various constraints: time windows (in seconds, hours, or days), resource
    capacity limits (connections, records, payload size), batch processing sizes,
    and behavioral multipliers.


    Identify:

    1. Which parameters represent time-based constraints (duration windows), and which
    represent capacity/size constraints?

    2. When sorted by numeric value from largest to smallest, name the top 3 largest
    and top 3 smallest values.

    3. Which parameter, if reduced to 50% of its current value, would most severely
    impact system throughput under high load?

    4. Calculate the ratio of the largest numeric value to the smallest numeric value
    across all 14 parameters.

    5. Identify whether any parameter''s value creates a logical dependency or cascading
    constraint on another parameter, and explain why.

    '
  correctness: 'A correct answer must:

    - Identify all 14 parameters correctly by their numeric values

    - Accurately categorize time-based (600s, 300s, 36h, 8s, 180s, 180s, 14d) vs.
    capacity (4, 5000, 2048, 250, 80, 2000) vs. other (1.5) parameters

    - Correctly rank parameters by numeric magnitude (accounting for unit conversions
    where applicable)

    - Identify 5000, 2048, 2000, 600, 300 as largest values and 4, 8, 1.5, 14, 250
    as smallest values in comparable magnitude ranges

    - Recognize that max_records_per_batch (5000) or max_deletion_batch_size (2000)
    or MAX_CONCURRENT_API_CONNECTIONS (80) would most impact throughput

    - Calculate accurate ratio considering the scaling across different units

    - Recognize that token_validity_hours constrains session cleanup timing, and batch
    sizes constrain sync/cleanup operations

    '
  completeness: 'A complete answer must:

    - Reference all 14 inserted parameters by name and value

    - Explain the functional purpose of each category of parameters

    - Provide reasoning for the cascading constraint relationships

    - Account for unit differences (seconds vs. hours vs. days) in comparisons

    - Discuss at least two specific cascading dependencies between parameters

    - Provide a coherent analysis of how these parameters interact to define system
    behavior under load

    '
