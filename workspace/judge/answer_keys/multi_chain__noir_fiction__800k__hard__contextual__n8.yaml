    inserted_text: "The man who came to 3F—he was the one coordinating Harvey's exit. The way he moved, cataloging the building and its people, taking inventory as if he needed to report every detail—he was assessing whether Harvey could use the building as a safe house or drop point. But more likely, he was confirming Harvey was ready to move. The heavy folder he carried, the one marked 'V.A.' on the spine—those were the logistics documents. Tickets, credentials, bank notes arranged through a shipping company in the harbor district."
