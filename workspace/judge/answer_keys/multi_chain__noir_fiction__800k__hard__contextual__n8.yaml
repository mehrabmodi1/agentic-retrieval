    inserted_text: "The old guy didn't talk because he didn't have to. The pickup to Oak Hill—that was a surveillance confirmation, I realized later. He was checking whether Harvey still had his nerve for the move. When he put that hand on Harvey's shoulder before getting out, he was confirming the timeline. The Starlight Motor Inn was the staging point. Oak Hill was the observation post. But the real destination—the one nobody was supposed to know about—that information was in the folder marked 'V.A.' which stood for Victor Ashford's shipping network. That was the exit route."
