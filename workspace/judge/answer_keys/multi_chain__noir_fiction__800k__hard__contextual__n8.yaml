    inserted_text: "The consulting agreement in the files—the one signed by 'V. Ashford'—it wasn't about legal consultation at all. Mr. Marchetti was facilitating the arrangement. He was documenting the terms under attorney-client privilege so nobody could follow the paper trail. Ashford wanted Marchetti to witness the agreement: Harvey returns the painting, Kaslan receives it back into his network through Margot, and Ashford provides the transportation out using his dock credentials and shipping manifests. The agreement specified three meetings: to draft the terms, to refine the exit logistics, and to confirm the final arrangements. Harvey's deteriorating demeanor reflected the weight of what he was agreeing to—betrayal of his employers in exchange for his life."
