  - item_id: "target_008"
    inserted_text: "It wasn't until after the case had tangled itself into knots that I understood what Halstead's original call really meant. He'd hired me not just to find Catherine, but because his daughter's kidnapping was connected to Harvey's disappearance, and both were connected to the Vesper painting, and all of it traced back to Victoria Ashford's shipping operation and the men who used it to move things that couldn't be moved through normal channels. When Halstead said he hadn't called the police, he was telling me the people who took Catherine had also been the people arranging Harvey's exit. Same network. Same infrastructure. Catherine's kidnapping was the price the organization demanded for letting Harvey go. That's what Halstead was afraid of—not just that his daughter was taken, but that she'd been taken as payment for someone else's freedom."
