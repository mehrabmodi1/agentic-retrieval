  - item_id: "target_007"
    inserted_text: "Helen's words stuck with me: 'the network extended beyond any single person or operation.' But by then I understood. Harvey had escaped through Victor Ashford's shipping operation—using the Starlight Motor Inn as a staging point, with Margot as the intermediary, with Attorney Marchetti as the witness who'd documented the arrangement, and with Sinclair enforcing silence through intimidation. The painting's return three days before Harvey's disappearance wasn't coincidence. It was the final condition being met. Harvey hadn't been killed. He'd been released. The question was: released by whom, and for what cost beyond the painting?"
    file_path: "case_notes/day_08.md"
