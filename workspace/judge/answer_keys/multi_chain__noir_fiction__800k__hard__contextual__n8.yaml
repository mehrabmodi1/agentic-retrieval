  - item_id: "target_005"
    inserted_text: "The painting was the leverage. When Harvey stole his conscience and wanted to return the Vesper painting, he wasn't just trying to clear his conscience—he was negotiating his exit price with Kaslan. Return the painting, and Kaslan agrees to let him go cleanly through Victor Ashford's channels. Ashford runs shipping. He can move people the same way he moves merchandise. The agreement was: the painting goes back to Vesper's widow, Harvey's debt is paid, and Margot—Kaslan's acquisition specialist—arranges the handoff while Ashford arranges the transportation."
    file_path: "witnesses/informant_interview.md"
