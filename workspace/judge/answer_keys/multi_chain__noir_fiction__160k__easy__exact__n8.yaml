  - item_id: "target_006"
    inserted_text: "Before I leave, I ask Sylvia about photographs. Does she remember anyone taking pictures at the Paradise? She nods. \"Yeah, actually. Some girl took a photograph here maybe six weeks ago. Posted it at the bulletin board by the bar—the one where people pin notes about jobs, lost items, that kind of thing. I remember because it was a pretty picture, her with some man, very formal-looking. But someone took it down after a few weeks. I figured it was the woman who posted it, getting tired of it being there.\" That photograph. That has to be the one."
    file_path: "case_notes/day_03.md"
    line_range: [90, 92]
