expected_answers:
  question: "You are given 16 pieces of evidence from a homicide investigation, each\
    \ pertaining to events on the night of the murder. Some pieces establish that\
    \ the suspect was at large (free, unaccounted-for) at or after a specific time;\
    \ others establish that the suspect was off-the-streets (accounted-for, with an\
    \ alibi) at or before a specific time.\n\nBelow are the 16 pieces of evidence:\n\
    \n1. The night nurse at Bellevue had Costa sedated and under restraint from ten\
    \ o'clock onward \u2014 there was no question of him leaving that ward.\n2. The\
    \ desk sergeant logged Costa's pickup at the precinct at five past nine \u2014\
    \ the suspect, demonstrably, was no longer at large.\n3. Old Mrs. Halloran from\
    \ across the hall swore on her late husband's grave that Costa came up the stoop\
    \ and slammed his door at six on the dot \u2014 she had just put the kettle on\
    \ and the radio was running the news.\n4. The Greek who runs the diner on Lex\
    \ told me, between bites of his own dinner, that Costa took the corner booth at\
    \ half past six and ordered nothing \u2014 just sat. He left after maybe twenty\
    \ minutes.\n5. Mrs. Pavone, his landlady, watched him climb the stairs to his\
    \ room at twenty past ten and bolted the front door behind him; she said the lock\
    \ had not been turned again before morning.\n6. The bartender at the Indigo served\
    \ Costa a third gin at twenty after eight; Costa lingered another half hour, the\
    \ bartender said, then left.\n7. Two patrolmen on the Grand-Central beat said\
    \ they tipped their caps to Costa as he came up out of the IRT \u2014 they fixed\
    \ it at eight-thirty, give or take, because they had just turned the corner past\
    \ the cigar shop.\n8. The night porter on the eastbound Twentieth Century swung\
    \ Costa's bag aboard at eleven forty-five; he saw the man tucked into the lower\
    \ berth and drew the curtain himself.\n9. Costa's lawyer arrived at the holding\
    \ cell at quarter to ten; Costa had been there for the better part of an hour\
    \ by then.\n10. Mickey was last seen alive \u2014 and very much alone \u2014 by\
    \ the doorman at the Astor at half past seven, the night of the killing.\n11.\
    \ Eddie at the newsstand on Forty-Third remembered selling Costa an evening Standard\
    \ at a quarter past six \u2014 'He paid in nickels, like always,' Eddie said,\
    \ 'and walked off east toward the river.'\n12. I caught up with the cigarette\
    \ girl at the Indigo. She remembered him fine. 'About a quarter of eight,' she\
    \ said, 'maybe a minute either side. Bought a pack of Luckies and didn't tip.'\n\
    13. The hotel switchboard operator had Costa on a long-distance call to Newark\
    \ from eleven that evening clear through midnight; she stayed on the line, as\
    \ she did with every long-distance, and could swear to it.\n14. A streetcar conductor\
    \ punched Costa's transfer at seven-oh-five, the night the Adler woman died. He\
    \ remembered the face \u2014 said the man had a bruise on his cheek that hadn't\
    \ been there the day before.\n15. By five of midnight, the theatre usher was certain\
    \ \u2014 he'd walked Costa, dead drunk, into the manager's office to sleep it\
    \ off, and the manager had locked the door from the outside.\n16. The jail clerk\
    \ pushed the booking slip across his desk and tapped the time stamp: nine-twenty,\
    \ sharp. 'He's been ours since,' the clerk said, 'and he ain't going anywhere.'\n\
    \nDerive the narrowest defensible time window during which the suspect was at\
    \ large on the night of the murder. Cite the specific pieces of evidence that\
    \ establish your window's lower and upper bounds. Justify your classification\
    \ of each piece of evidence's bound direction.\n"
  correctness: "The answer must derive the narrowest valid window. The lower endpoint\
    \ is established by the fact whose bound_direction is 'lower' and bound_value\
    \ is largest: 'The bartender at the Indigo served Costa a third gin at twenty\
    \ after eight; Costa lingered another half hour, the bartender said, then left.'\
    \ (value: 8:50 PM). The upper endpoint is established by the fact whose bound_direction\
    \ is 'upper' and bound_value is smallest: \"The desk sergeant logged Costa's pickup\
    \ at the precinct at five past nine \u2014 the suspect, demonstrably, was no longer\
    \ at large.\" (value: 9:05 PM). The agent must cite both facts."
  completeness: The agent must classify each of the 16 facts as a lower or upper bound
    consistent with the answer-key bound_direction field, OR justify any deviation
    in the reasoning.
