  inserted_text: 'When asked if anyone unusual had visited Mr. Harvey''s apartment, Eva nodded slowly. "The heavy man, the one I mentioned before—Gregg, they called him—he came back three days before Mr. Harvey left. This time, I heard their conversation through the thin walls. Mr. Gregg said, ''Your situation has become unsustainable. Kaslan has made a decision.'' Mr. Harvey said nothing at first, then asked, ''What decision?'' The response was: ''The kind where you disappear completely, or you don''t disappear at all.''"'
  file_path: witnesses/landlady_statement.md
