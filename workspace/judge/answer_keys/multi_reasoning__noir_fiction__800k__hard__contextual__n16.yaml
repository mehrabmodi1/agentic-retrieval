  inserted_text: '"Which would indicate external assistance. If Harvey did this alone, he might have left something. But if someone helped him—Margot, for instance—the operation would have been professional and clean."


    Victor leaned back. "There''s something else you should know. The painting that was returned—the way it was returned, with that note in Harvey''s handwriting—that was negotiated as part of his exit deal. Return the stolen goods, demonstrate moral restitution, and in exchange, Kaslan''s intermediaries would facilitate his passage out of the city. The Vesper estate painting was leverage. Harvey used it to buy his freedom."'
  file_path: witnesses/informant_interview.md
