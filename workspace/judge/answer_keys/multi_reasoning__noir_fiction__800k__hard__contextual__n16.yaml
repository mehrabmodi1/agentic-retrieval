  inserted_text: It was possible that her mysterious lover had taken her. It was possible that someone had taken her to get to him. It was possible that Catherine knew too much about something illegal or compromising, and this was a warning to keep quiet. Or—and this possibility chilled me—it was possible that Catherine had been taken to force 'H' to make a decision about his loyalty. The kidnapping wasn't about Catherine at all. It was about a man named Harvey, or someone like him, who worked in the shadows and needed to be reminded of the stakes.
  file_path: chapters/chapter_04.md
