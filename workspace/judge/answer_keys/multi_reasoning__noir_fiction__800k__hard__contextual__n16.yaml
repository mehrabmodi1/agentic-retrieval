  inserted_text: I looked at the bottle of bourbon on my desk. It was half-empty—or half-full, depending on whether you were an optimist or just hadn't learned your lesson yet. I poured the rest of it down the sink and made coffee instead. It was going to be a long night, and I needed to be sharp. The details were already forming a pattern. A kidnapping. A girl taken from a restaurant. Money demanded. And somewhere in the background, the suggestion of organized crime—the kind of operation that didn't announce itself with empty threats. Kaslan. The name Halstead mentioned would resurface, I was certain.
