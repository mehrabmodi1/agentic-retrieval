  inserted_text: '**HALLOWAY:** Based on the evidence, Harvey is both. He was a facilitator for the Kaslan operation—moved stolen paintings, arranged logistics, handled logistics that required knowledge of international routes. But he was also a man with a conscience. The nighttime pacing, the insomnia—he was caught between the person he''d become and the person he wanted to be. When he saw a way out, he took it, even knowing the consequences.'
  file_path: witnesses/detective_debrief.md
  line_range:
  - 40
  - 44
  context_summary: Characterizes Harvey as both criminal facilitator and morally conflicted person who sought redemption.
