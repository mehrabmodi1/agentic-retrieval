- item_id: target_010
  inserted_text: 'What nobody knows at this moment is that James Harvey—the man we''ve been searching for—will never be found. His apartment is empty. His bank account is closed. The woman with red hair who met him at the bar has disappeared as well. Victor''s sources confirm that Harvey made it out of the city two weeks ago, aided by someone from within the network. Kaslan made a calculation: a junior facilitator gone quietly was better than a junior facilitator talking to police. The exit was purchased with the painting''s return and Harvey''s absolute silence.'
  file_path: case_notes/day_07.md
  line_range:
  - 25
  - 31
  context_summary: Confirms Harvey's successful escape from the city with help from within the network.
- item_id: target_011
  inserted_text: '"Harvey''s situation is different," I said before Chen could continue. "He''s not dead. He made a deal. The paintings, the financial records, the woman who met with him—it all points to orchestrated departure. Someone at a very high level authorized it. Kaslan, or whoever stands above Kaslan, decided that letting Harvey go was better than keeping him contained. A disappearance is cleaner than a death. Nobody asks questions about a man who simply isn''t there anymore."'
  file_path: case_notes/day_06.md
  line_range:
  - 8
  - 14
  context_summary: Analysis of Harvey's departure as an authorized exit rather than a death or capture.
- item_id: target_012
  inserted_text: 'Mercer closes his eyes, and I sit there for a while longer, listening to him breathe. Before I leave, I mention Harvey. Mercer''s response is immediate, almost reflexive: "I helped him. I shouldn''t have, but I did. He came to me asking for legal advice on disappearing completely—not criminally, but personally. How to sever all ties, create distance, start over. I told him it wasn''t possible, not the way he wanted. But I gave him the name of someone who handles that kind of transition. Someone who works on behalf of people trying to escape situations they can''t escape legally. I told myself it was the right thing to do. I''m still not sure."'
  file_path: case_notes/day_05.md
  line_range:
  - 73
  - 81
  context_summary: Mercer's admission that he provided Harvey with an intermediary contact to facilitate his disappearance.
