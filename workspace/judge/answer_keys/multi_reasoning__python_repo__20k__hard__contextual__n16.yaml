expected_answers:
  question: 'Given a system designed to handle peak concurrent load, calculate the maximum

    number of simultaneous database operations, task processing, and API requests

    the system can support when considering: (1) worker threads and connections per

    worker, (2) sync batch constraints and concurrency limits, (3) API rate limiting

    windows and thresholds, (4) task timeouts and retry behaviors, and (5) test

    infrastructure connection pooling. What is the total effective throughput capacity

    accounting for all these interconnected limits?

    '
  correctness: "A correct answer must identify and extract all 16 distinct metrics:\n- 5 worker/database configuration values (worker_threads, max_connections_per_worker,\n  idle_timeout, pool_size calculation, max_overflow)\n- 3 sync operation constraints (batch size, min interval ms, retry attempts)\n- 3 concurrency/throughput values (max concurrent syncs, hard timeout, soft timeout)\n- 2 test infrastructure limits (test DB connections, parallel workers)\n- 2 API/request limits (request timeout, rate limit window)\n- 1 priority/scheduling value (task priority)\n\nThe answer must explain how these values interact:\nTotal capacity = (5 workers × 3 connections × 2 overflow) × (1000 sync ops) ÷\n(500ms intervals) with constraints from 3600s rate limit windows and 120s soft timeouts.\n"
  completeness: "A complete answer must:\n1. Calculate database connection pool size (5 × 3 × 2 = 30 total connections)\n2. Account for maximum concurrent sync operations (1000 operations)\n3. Consider API throttling interval (500ms minimum between requests)\n4. Apply rate limit window (3600 second hour for 1000 requests per user)\n5. Factor in task timeouts (120s soft, 600s hard limits)\n6. Note test infrastructure can maintain 25 test connections with 10 parallel workers\n7. Explain batch size impact (200 items max per operation)\n8. Calculate effective throughput: (1000 sync ops / 0.5s) = 2000 ops/sec ceiling,\n   limited by database connections to (30 connections / 0.5s interval) = 60 ops/sec\n   per database connection, total effective = min(2000, 30 × 60 × 2 overflow) = min(2000, 3600)\n9. Apply user rate limiting constraint: 1000 requests per 3600s = ~0.28 req/s per user\n10. Conclude total system throughput accounting for all serializing constraints\n"
rubric_criteria:
- criterion: correctness
  weight: 1.0
  description: Must extract and correctly identify all 16 metrics without misinterpretation
- criterion: completeness
  weight: 0.5
  description: Must connect all metrics into a coherent capacity calculation demonstrating understanding of system constraints
- criterion: reasoning
