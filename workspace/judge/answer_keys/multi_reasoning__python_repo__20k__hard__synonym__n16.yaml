expected_answers:
  question: 'Analyze the distributed system''s throughput and resource constraints. Calculate the maximum

    data volume that can be processed across all worker subsystems in one hour, considering:

    (a) How many parallel tasks the worker threads can execute simultaneously

    (b) The API request quota allocation across user tiers

    (c) The batch size and sync frequency settings for data synchronization

    (d) The retry mechanism constraints and backoff strategy


    List all discovered configuration parameters (as key=value pairs) and explain how they

    collectively shape the system''s maximum sustained and burst capacity.

    '
  correctness: "A correct answer must identify and accurately report all 16 configuration parameters:\n- Worker concurrency: worker_thread_count (12), max_concurrent_tasks (2048),\n  task_processing_timeout_seconds (3600)\n- API rate limiting: request_quota_per_hour (10000), burst_limit_per_second (100),\n  Anonymous user limit (500/hr), Premium user limit (50000/hr)\n- Sync configuration: batch_size (250), retry_attempts (5), max_concurrent_syncs (8),\n  max_payload_size_mb (100), sync_interval_minutes (15)\n- Retry handling: max_retries_per_task (6), retry_backoff_multiplier (2),\n  max_retry_queue_size (10000)\n- Validation: max_field_count_per_request (50)\n"
  completeness: "A complete answer must:\n1. Extract all 16 numeric and enumerated configuration values from their embedded contexts\n2. Synthesize cross-system understanding: worker throughput is constrained by both\n   thread count AND max_concurrent_tasks; API throughput varies by user tier; sync operations\n   are batched and frequency-limited; retries use exponential backoff\n3. Calculate aggregate capacity: e.g., (worker_threads × tasks_per_thread) parallel paths,\n   (premium_quota × number_of_premium_users) maximum hourly API throughput,\n   (batch_size × max_concurrent_syncs × 60 / sync_interval) data items per hour\n4. Explain resource tradeoffs: timeout vs throughput, concurrency vs payload size,\n   retry attempts vs backoff multiplier effects on recovery time\n"
