expected_answers:
  question: 'Locate all 10 system performance and capacity thresholds distributed
    across different modules.

    These are a mix of timeout values (measured in seconds), batch/pagination limits
    (integer counts),

    and request rate constraints (per minute). Once you have identified all 10 thresholds
    with their

    numeric values, perform the following integrated analysis:


    (1) Arrange all 10 values in ascending numeric order and identify the smallest
    and largest.


    (2) Calculate the median value of all 10 thresholds.


    (3) Calculate the ratio of the largest value to the smallest value.


    (4) Identify which 3 timeout constraints would be first violated if all timeout
    values were reduced by 50%.


    (5) Evaluate system capacity: if a user makes 120 requests per minute over sessions
    lasting 900 seconds,

    and each request generates a batch of 50 notifications taking 30 seconds to process
    with possible retries,

    would the 60-second worker timeout accommodate this demand? Justify using relevant
    thresholds.


    (6) Determine which constraint represents the most critical bottleneck in the
    system by analyzing the

    relationships between pagination limits (100 items), report generation (5000 rows),
    API key cache duration (300s),

    token expiration (1800s), and error retry policy (5 attempts).


    Your answer must cite all 10 specific values by name and demonstrate how each
    contributes to the overall

    system design analysis. Removing any single value would make a complete answer
    impossible.

    '
  correctness: 'A correct answer must:

    - Identify all 10 thresholds with exact numeric values: 60, 5, 50, 300, 120, 1800,
    30, 100, 5000, 900

    - Provide correct ascending order: 5, 30, 50, 60, 100, 120, 300, 900, 1800, 5000

    - Calculate median correctly as (100 + 120) / 2 = 110

    - Calculate largest-to-smallest ratio as 5000 / 5 = 1000

    - Identify timeouts affected by 50% reduction: 60 → 30, 300 → 150, 1800 → 900,
    900 → 450, 30 → 15 (five affected)

    - Analyze user load: 120 req/min × 15 min (900s) = 1800 total requests, batch
    size 50 means 36 batches, at 30s per batch = 1080s minimum

    - Recognize worker timeout (60s) cannot accommodate 30s per batch for sustained
    load

    - Identify the worker timeout (60s) as primary bottleneck, with pagination (100)
    as secondary capacity constraint

    - Reference the relationships between all 10 values in justification

    '
  completeness: 'A complete answer covers:

    - All 10 values explicitly identified with names and numbers

    - Full numerical ordering from smallest to largest

    - Median calculation using all 10 values

    - Ratio calculation demonstrating understanding of magnitude span

    - Analysis of which 3-5 timeout values would fail under 50% reduction

    - Multi-step load capacity calculation referencing request rate, session duration,
    batch size, and processing time

    - Bottleneck identification explaining why the worker timeout is the limiting
    factor

    - System design reasoning that shows how constraints interact and depend on each
    other

    - Acknowledgment that all 10 values are necessary for complete system analysis

    - Discussion of how removing any single value would break the capacity or design
    analysis

    '
