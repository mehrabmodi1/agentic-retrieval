    inserted_text: "And I didn't know, not yet, that Catherine's disappearance would connect to Meridian Holdings, to a warehouse on Dock Street, to a facilitator named Harvey, to stolen artwork, and ultimately to a small motor inn room where valuable things wait in the dark for their next transaction."
