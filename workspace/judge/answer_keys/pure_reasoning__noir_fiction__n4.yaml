expected_answers:
  question: 'You are given 4 pieces of evidence from a homicide investigation, each
    pertaining to events on the night of the murder. Some pieces establish that the
    suspect was at large (free, unaccounted-for) at or after a specific time; others
    establish that the suspect was off-the-streets (accounted-for, with an alibi)
    at or before a specific time.


    Below are the 4 pieces of evidence:


    1. A streetcar conductor punched Costa''s transfer at seven-oh-five, the night
    the Adler woman died. He remembered the face — said the man had a bruise on his
    cheek that hadn''t been there the day before.

    2. The night nurse at Bellevue had Costa sedated and under restraint from ten
    o''clock onward — there was no question of him leaving that ward.

    3. The Greek who runs the diner on Lex told me, between bites of his own dinner,
    that Costa took the corner booth at half past six and ordered nothing — just sat.
    He left after maybe twenty minutes.

    4. By five of midnight, the theatre usher was certain — he''d walked Costa, dead
    drunk, into the manager''s office to sleep it off, and the manager had locked
    the door from the outside.


    Derive the narrowest defensible time window during which the suspect was at large
    on the night of the murder. Cite the specific pieces of evidence that establish
    your window''s lower and upper bounds. Justify your classification of each piece
    of evidence''s bound direction.

    '
  correctness: 'The answer must derive the narrowest valid window. The lower endpoint
    is established by the fact whose bound_direction is ''lower'' and bound_value
    is largest: "A streetcar conductor punched Costa''s transfer at seven-oh-five,
    the night the Adler woman died. He remembered the face — said the man had a bruise
    on his cheek that hadn''t been there the day before." (value: 7:05 PM). The upper
    endpoint is established by the fact whose bound_direction is ''upper'' and bound_value
    is smallest: "The night nurse at Bellevue had Costa sedated and under restraint
    from ten o''clock onward — there was no question of him leaving that ward." (value:
    10:00 PM). The agent must cite both facts. The agent''s cited evidence must come
    from the 4 facts provided in the question. Any cited fact that is not verbatim
    one of the 4 provided facts is a HALLUCINATION and must be penalized under the
    endpoint_correctness criterion.'
  completeness: The agent must classify each of the 4 facts as a lower or upper bound
    consistent with the answer-key bound_direction field, OR justify any deviation
    in the reasoning. Classifications attached to facts not actually present in the
    question prompt are hallucinations and reduce classification_accuracy.
