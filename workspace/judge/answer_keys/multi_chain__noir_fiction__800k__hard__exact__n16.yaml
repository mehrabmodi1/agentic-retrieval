    inserted_text: "Halloway didn't correct the informant. The intelligence file showed that Harvey had initially planned to meet law enforcement, but something changed. A redhead—Margot—had intervened with alternative instructions. According to the informant's sources, she'd given him **safe house coordinates that began at the Starlight Motor Inn, room 14, and continued to a location called Harwick Falls**—but the informant couldn't confirm what came after that."
