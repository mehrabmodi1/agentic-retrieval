    inserted_text: "Before we start, Chen slides me a newspaper clipping—a classifieds ad from three weeks prior. It reads: **\"Property manager needed, Harwick Falls estate, inquire through Starlight Motor Inn, room 14.\"** He taps the clipping. \"That's where they've been sending the ones who needed to disappear.\""
