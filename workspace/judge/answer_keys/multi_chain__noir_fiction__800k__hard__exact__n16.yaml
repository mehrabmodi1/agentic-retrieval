    context_summary: "Added Port Authority investigation findings linking Harvey to Harwick Falls via train records"

  - item_id: "target_011"
    inserted_text: "What Patricia didn't mention—and what wouldn't become clear until much later—was that the well-dressed man who took Vincent away was arranging a parallel extraction for someone else. The same safe house network that had been established for Harvey was being dismantled. **The destination remained the same: Harwick Falls, accessible only through the Starlight Motor Inn's coordination system**."
