  - item_id: "target_015"
    inserted_text: "But what I didn't know then—what nobody knew—was that Catherine's kidnapping was connected to a larger disappearance. **Harvey had fled to a place called Harwick Falls**, and Catherine was leverage to keep him there, or to keep him silent about what he'd discovered."
