  - item_id: "target_010"
    inserted_text: "Before I go, though, I make a call to a source inside the Port Authority. He confirms something crucial: **a man matching Harvey's description was scheduled to depart on the northbound rail line on October 30th**, traveling to **a destination listed on the manifest as Harwick Falls—the same location mentioned in multiple witness statements about the Starlight Motor Inn's guest records**."
