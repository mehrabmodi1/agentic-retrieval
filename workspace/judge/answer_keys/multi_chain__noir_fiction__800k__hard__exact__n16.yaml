    inserted_text: "What Patricia hadn't seen was the back of the card. On the reverse, in tiny handwriting, was written: **\"Harwick Falls - the estate north of town. Ask for the groundskeeper.\"** It was a reference, I realized later, to where the entire operation had been heading all along."
