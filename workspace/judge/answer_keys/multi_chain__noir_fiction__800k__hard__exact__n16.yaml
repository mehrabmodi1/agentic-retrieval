  - item_id: "target_014"
    inserted_text: "But before she can speak, I tell her what I've discovered. \"Harvey made it out,\" I say. \"He's at Harwick Falls. That's where the trail ends—where it was always supposed to end.\" Helen's silence confirms what she already knows. The investigation had been leading there all along. **Harwick Falls**—the destination that appears in the cab driver's train receipt, the innkeeper's records, the redhead's instructions, and the classified ad. That's where Harvey is alive."
