expected_answers:
  question: "Given the 8 system configuration constraints (DB_CONNECTION_POOL_MAX_OVERFLOW=5, RATE_LIMIT_REQUESTS_PER_MINUTE=1000, DEFAULT_MAX_PAGE_SIZE=100, RESPONSE_COMPRESSION_THRESHOLD_BYTES=1024, API_REQUEST_TIMEOUT_SECONDS=120, WORKER_PIPELINE_DISPATCH_TIMEOUT_SECONDS=300, STRING_SANITIZE_MAX_LENGTH_BYTES=1000, TASK_STATUS_PERSISTENCE_TIMEOUT_MINUTES=30), if the system must handle 100 concurrent users each making 50 paginated API requests to retrieve 5000 total records, which THREE configuration values would most constrain the system's throughput, and what is the maximum sustained request rate (requests/second) achievable under current configuration?"
