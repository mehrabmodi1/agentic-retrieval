  - item_id: "target_003"
    inserted_text: "The ledger she was organizing—what was in it? Margaret goes very still. How did you know about that? I didn't. But now I do. What was in it? Just... records. Property transfers. Account numbers for shell corporations. Nothing that should have interested Claire. But after she saw those numbers, everything changed. You think Castellano knew what she knew? I think whoever took her knew exactly what was in that ledger, and they knew Claire had seen it."
