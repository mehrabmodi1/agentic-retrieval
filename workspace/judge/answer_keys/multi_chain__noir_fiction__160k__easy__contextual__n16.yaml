  - item_id: "target_002"
    inserted_text: "Before I leave, I ask if Margaret's daughter had been working on anything unusual. Margaret hesitates. Claire was helping me organize some documents. A financial ledger from a charitable acquisition. I asked her to keep it at home, to consolidate some records. She was good with numbers. That's interesting. A missing girl who knew her mother's business records."
    file_path: "case_notes/day_01.md"
    line_range: [33, 38]
