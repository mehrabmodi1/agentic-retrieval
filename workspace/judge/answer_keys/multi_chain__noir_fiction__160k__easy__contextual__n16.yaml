  - item_id: "target_012"
    inserted_text: "When we got to the address, a big house set back from the road, the old man got out first. The kid stayed in the cab. I thought he was going to ask me to wait, but he said, 'Just drive.' And his voice was different when he said it. Broken somehow. So I drove. Did the old man seem to be leaving something at the house? A package? That I can't say for sure. But when he came out of the cab, his jacket pocket looked empty. Heavy with intention, if you know what I mean. Like he'd delivered something important."
    file_path: "witnesses/cab_driver_statement.md"
    line_range: [42, 50]
    context_summary: "Jerry confirms the documents were delivered to the Oak Hill address."

  - item_id: "target_013"
    inserted_text: "Possibly. The painting's recovery three days before Harvey's disappearance could be coincidental, or it could indicate that Harvey arranged its return as a condition of his exit. Return the stolen goods, clean your conscience, and in exchange Margot arranges your transportation out of the city. The Kaslan operation loses the painting but keeps Harvey quiet. But there's also the ledger documents he obtained through Marchetti. We should consider what he was trading—not just the painting, but information. The ledger pages Harvey collected contain evidence of the money laundering network. If he arranged for those to be delivered to someone trustworthy before he left, that would explain why he needed the lawyer's consultation—Marchetti likely advised him on how to legally position the evidence."
    file_path: "witnesses/detective_debrief.md"
    line_range: [48, 57]
    context_summary: "Debrief analysis recognizes the ledger documents as crucial evidence Harvey obtained through legal consultation."

  - item_id: "target_014"
    inserted_text: "Before I call Eddie, I get a break. A package arrives at my office, no postage, no return address. Inside: a set of ledger pages. Photocopied financial records showing account transfers, shell corporations, the whole network. Attached to the envelope is a note: For Helen Crawford. These prove everything. I know immediately who sent them. Harvey. Before he left the city, he made sure the evidence found its way to someone who could use it. Someone trustworthy."
    file_path: "case_notes/day_04.md"
    line_range: [8, 18]
    context_summary: "Shepherd receives the ledger documentation that Harvey arranged to distribute."

  - item_id: "target_015"
    inserted_text: "Chen says he's had a breakthrough. Someone finally willing to talk. A former Sinclair employee who's decided that loyalty's less valuable than truth. But the real breakthrough is the documentation. The ledger pages that prove the entire network. Chen has them. Someone sent him copies of the same documents that Helen received—the ones proving that Sinclair ordered Claire's death and covered it up through the organization's financial apparatus."
    file_path: "case_notes/day_06.md"
    line_range: [10, 16]
    context_summary: "David Chen obtains the ledger documentation that proves Sinclair's guilt."

  - item_id: "target_016"
    inserted_text: "What makes this case different now is the ledger documentation. The financial records show that Sinclair ordered a complication removed—coded language for Claire's death. The account transfers that funded the operation. The names of the men who carried it out. All documented in meticulous accounting. When that evidence comes out—and Helen says the DA is using it as the foundation of the case—Sinclair goes from powerful businessman to documented murderer. The ledger is the thread that unravels everything."
    file_path: "case_notes/day_07.md"
