  - item_id: "target_011"
    inserted_text: "When the old guy left, he put his hand on the kid's shoulder. There was something in the gesture—something almost paternal, you know? But also something like a warning. Like a man putting his hand on a horse's neck before the race, trying to tell it to run but also knowing the horse might not come back. Before he stood up, the old man grabbed the kid's wrist—not rough, but firm—and I saw his mouth move. Just a few words. The kid nodded, eyes down. And then I saw what the old man had done—he'd left a folder on the table. Looked like it had papers in it. Ledger pages, or documents of some kind. The kid put the folder in his jacket without even looking at it. Like he knew exactly what it was and what he had to do with it."
    file_path: "witnesses/bartender_statement.md"
    line_range: [38, 45]
