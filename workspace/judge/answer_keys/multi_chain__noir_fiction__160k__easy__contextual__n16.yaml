    line_range: [40, 52]
    context_summary: "Investigation reveals the ledger contained account numbers that endangered Claire."

  - item_id: "target_004"
    inserted_text: "Before I go further, I check the real estate records—specifically the account numbers Margaret mentioned. There's a pattern. The shell corporations all use sequential account identifiers, all registered through a single intermediary. The intermediary is someone named Victor Ashford, import-export specialist."
