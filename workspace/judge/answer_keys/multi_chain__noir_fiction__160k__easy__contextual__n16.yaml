  - item_id: "target_010"
    inserted_text: "After that visitor, I noticed something else. He kept documents—ledger pages, I believe—carefully secured in his apartment. I would see him at night, arranging them, studying them under the lamp. As though he was preparing to share them with someone."
    file_path: "witnesses/neighbor_statement.md"
    line_range: [42, 45]
