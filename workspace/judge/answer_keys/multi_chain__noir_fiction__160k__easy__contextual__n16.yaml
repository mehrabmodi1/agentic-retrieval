    line_range: [22, 28]
    context_summary: "Shepherd traces the account numbers from the ledger to Victor Ashford."

  - item_id: "target_005"
    inserted_text: "Did she ever mention what he did for work? His business? Margaret Chen and Eleanor exchanged glances. She said once that he worked in finance. In something legitimate-sounding, but she said he wasn't happy with it. She said he'd gotten involved with some people who made him uncomfortable. Did she ever discuss specific business concerns? Account numbers, anything like that? No. But we noticed she was anxious after her mother asked her to work on some kind of financial document. She seemed to be struggling with something."
    file_path: "chapters/chapter_03.md"
    line_range: [35, 50]
    context_summary: "Catherine's friends reveal she was troubled after working with her mother's financial documents."

  - item_id: "target_006"
    inserted_text: "I made a mistake today. I was at Mother's office, looking at the ledger she asked me to organize, and I saw account numbers. Familiar numbers. The same numbers that H mentioned once when he thought I was asleep. The account transfers through the Paradise, through something called Castellano Holdings. Mother is connected to this. My lover is connected to this. I am trapped between two people I love, and they're on opposite sides of something terrible."
    file_path: "chapters/chapter_04.md"
    line_range: [23, 28]
    context_summary: "Catherine's journal reveals she discovered connections between the ledger accounts and her lover H."

  - item_id: "target_007"
    inserted_text: "What company? I'm not sure. But what's strange is that they knew about the ledger Catherine was working on. They knew about the account numbers. How would they know that unless... He trailed off, but I finished the thought for him. Unless someone told them. Someone who knew what Catherine had seen."
    file_path: "chapters/chapter_05.md"
    line_range: [40, 50]
    context_summary: "Shepherd deduces that someone revealed the ledger's contents to orchestrate Catherine's kidnapping."

  - item_id: "target_008"
    inserted_text: "Did he bring documents with him? Papers? Dorothy paused. The first meeting, yes. He brought a briefcase. But the second and third visits, he brought nothing. Nothing except... wait. The last visit, he had a small envelope. Very thin. It looked like it contained documents, but I never saw the contents. When he left, he wasn't carrying it anymore. Mr. Marchetti had it."
    file_path: "witnesses/secretary_statement.md"
    line_range: [20, 26]
    context_summary: "Dorothy reveals Harvey delivered document-filled envelope to attorney Marchetti."

  - item_id: "target_009"
    inserted_text: "When the man visited him, the one with white hair—did he leave anything behind? Leave something? No. But he took something. Or gave something. When he came down from the apartment, his hands were empty, like he'd delivered a package. And Mr. Harvey, when I saw him the next day—he had papers. Ledger pages, I think. He was very careful with them, kept them in a folder."
    file_path: "witnesses/landlady_statement.md"
    line_range: [23, 31]
