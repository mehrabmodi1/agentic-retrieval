expected_answers:
  question: 'Based on the system architecture, when a user creates a project with tasks and emails are processed with full validation and security requirements, what is the minimum total sum of: (1) email log database fields, (2) maximum character length constraint for user profile names, (3) project status/visibility enum options combined, (4) task status states, (5) sync operation tracked fields, (6) required API key validation checks, and (7) enforced security headers? Then, explain which components would need to interact for a complete email notification with retry flow to function correctly.'
  correctness: 'The numerical answer must sum to 28:

    - Email log fields: 8

    - User name constraint: 100 (from max 100 characters for first_name and last_name)

    - Project enums: 6 (3 visibility + 3 status)

    - Task status states: 2 (pending + completed)

    - Sync fields: 5 (sync_type, direction, status, records_synced, records_failed)

    - API key checks: 3 (active status, expiration, password verification)

    - Security headers: 5 (X-Content-Type-Options, X-Frame-Options, X-XSS-Protection, Strict-Transport-Security, Content-Security-Policy)

    Total: 8 + 100 + 6 + 2 + 5 + 3 + 5 = 129


    The interaction component must identify:

    - Email worker (_log_email) records all 8 fields to database

    - Validators enforce 100-char limit for user profile before email can be queued

    - Test queue shows email_task uses apply_async for task queueing

    - Project must satisfy visibility/status enum constraints for user context

    - Task status transitions from pending through retry workflow

    - Sync logging captures metrics for background operations

    - API key validation gates access to email API

    - Security headers protect all responses containing logged email data

    '
  completeness: 'A complete answer must:

    1. Find and correctly sum all 8 distinct metric values from different system components

    2. Identify that the 100-char constraint applies to BOTH first_name AND last_name fields

    3. Distinguish between email log fields (8), task states (2), project states (6), sync fields (5), API checks (3), and security headers (5)

    4. Explain the dependency chain: validation → queuing → logging → sync tracking → security headers

    5. Demonstrate understanding that email notification retry flow requires all these components to work together

    6. Recognize that the answer requires cross-file synthesis since no single file contains all the information

    '
