  inserted_text: October 29th. He brings the rent check, and he seems lighter, like a weight has been removed. We speak about the weather—it is turning cold—and he says he might spend Thanksgiving with family. Family! In three years, he has never mentioned family. I don't even know if he has family. But that day he mentions it like he is making a promise to himself. He also leaves behind a note hidden under the loose floorboard—I found it after his disappearance. The note says, 'If anyone asks, tell them to check with Marchetti at Consolidated Building, Suite 1450. He'll explain about the ledger and what it means.' Then he leaves.
