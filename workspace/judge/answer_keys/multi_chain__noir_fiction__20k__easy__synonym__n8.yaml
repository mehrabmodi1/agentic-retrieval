- item_id: target_008
  inserted_text: 'I walked north, retracing the route Catherine would have taken. The neighborhood was exactly what Eleanor had described: well-lit, quiet, respectable. The kind of place where you wouldn''t expect violence or theft or kidnapping. The kind of place where people trusted that safety was a given. But I was beginning to understand something. Catherine hadn''t been grabbed randomly. She''d been taken because of what she knew. She''d been taken because her father was involved with the Kaslan operation. And now, with the ledger missing, with Harvey gone, with the painting recovered—there was only one person left who could identify the specific locations and operations. Only one person who had seen the manifests, the photographs, the proof of what was stored at Pier 11, Warehouse C. Catherine Halstead was alive, but she was being held as insurance. As the one piece Sinclair could use to ensure that no one talked, no one testified, no one brought down the entire operation. She was the final guarantee of everyone''s silence.'
  file_path: chapters/chapter_03.md
  line_range:
  - 81
  - 85
  context_summary: Shepherd's final realization that Catherine is alive but being held as insurance/leverage at Pier 11, Warehouse C to prevent testimony against the Kaslan operation.
