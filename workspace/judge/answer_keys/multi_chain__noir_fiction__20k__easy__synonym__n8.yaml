  inserted_text: '''And these specialty goods—they wouldn''t happen to include anything that might interest someone enough to kidnap your daughter?'' He looked away, out the window at the pre-dawn gray that was starting to seep into the darkness. ''I have had... dealings. With people who aren''t always on the right side of the law. Nothing violent, nothing involving drugs. But yes, there are people who wouldn''t mind having leverage against me. Specifically, an organization called Kaslan. They''ve been moving stolen art through my import network. Catherine found out. She found documents in my office—shipping manifests, location details. The warehouse at Pier 11, Warehouse C. That''s where they keep the high-value pieces. That''s where they''re probably keeping her.'''
