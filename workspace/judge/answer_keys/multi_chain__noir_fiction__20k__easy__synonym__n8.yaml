  inserted_text: By four in the afternoon I'm back at the waterfront, looking for Paulie. I find him at the Anchor, nursing a beer and looking nervous. 'I need information,' I tell him. 'About the Kaslan operation and Pier 11. That's where Sinclair runs the real storage facility. Warehouse C. That's where Catherine is being held. The redheaded woman—the one called Margot—she has Catherine because of something her father Halstead did. But Sinclair doesn't care about Halstead. Sinclair cares about what Harvey knows about the operation and who he's told.' Paulie goes even whiter. 'You know about Pier 11?'
