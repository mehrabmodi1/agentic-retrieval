  inserted_text: '''That''s the interesting part,'' Victor said, and for the first time there was something like satisfaction in his voice. ''The painting was recovered. Three days ago, it was found leaning against the steps of the public library downtown. There was a note attached. It said, "Property of the Vesper Estate. Return to family of Carl Vesper with apologies. The real inventory is stored at Pier 11, Warehouse C under Sinclair''s control." No signature. But the message was clear: someone wanted to return the painting but couldn''t do it openly, and someone else wanted law enforcement to know where the real operation was based.'''
