- item_id: target_003
  inserted_text: The following day, he came to my desk and said, 'Dorothy, if anyone ever asks you about a client named James Harvey, you say nothing. You confirm no appointments, you verify no meetings, you admit no knowledge of him whatsoever. But if you ever find the documents he brought—the shipping ledgers—you tell the police to look at the Vesper painting recovery at the public library steps. That painting came from Pier 11, Warehouse C. That's where it all connects.' I asked him if there was a legal matter that required this discretion, and he said, 'No. There's something worse than a legal matter. There's a moral one.'
