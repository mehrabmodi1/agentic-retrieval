    peak, the next certificate rotation, the latest replication lag spike, etc.).


    Some parameters establish a *lower bound* on the migration start time (must wait
    at least X seconds after the reference event).


    Others establish an *upper bound* on the migration end time (must complete before
    X seconds after the reference event).


    Below are the 16 facts:


    1. ON_CALL_HANDOFF_QUIET_S = 1500

    2. PLANNED_MAINTENANCE_CLOSE_S = 18000

    3. PEAK_TRAFFIC_RAMP_BEGIN_S = 5400

    4. REPLICATION_LAG_RECOVERY_S = 300

    5. DEPLOY_FREEZE_BOUNDARY_S = 14400

    6. BACKUP_WINDOW_OPEN_S = 7200

    7. CERT_ROTATION_GRACE_S = 1800

    8. ALERTING_SILENCE_EXPIRES_S = 4500

    9. LEADER_ELECTION_QUIESCE_S = 900

    10. WEEKLY_SNAPSHOT_KICKOFF_S = 25200

    11. INFLIGHT_RPC_DRAIN_S = 180

    12. AUTOSCALER_SCALEDOWN_DEADLINE_S = 10800

    13. TRACE_FLUSH_BUFFER_S = 120

    14. AUTOVACUUM_TAIL_DRAIN_S = 1200

    15. METRICS_ROLLUP_TRIGGER_S = 9000

    16. DDL_LOCK_COOLDOWN_S = 600


    Derive the narrowest safe-migration window [earliest_start, latest_end] consistent
    with all 16 constraints. For each endpoint, cite the parameter that establishes
    it. Justify your classification of each parameter''s bound direction.

    '
  correctness: 'The answer must derive the narrowest valid window. The lower endpoint
    is established by the fact whose bound_direction is ''lower'' and bound_value
