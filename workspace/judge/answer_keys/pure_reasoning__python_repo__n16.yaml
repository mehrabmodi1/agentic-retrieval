    is established by the fact whose bound_direction is ''upper'' and bound_value
    is smallest: ''ALERTING_SILENCE_EXPIRES_S = 4500'' (value: 4500). The agent must
    cite both facts.'
  completeness: The agent must classify each of the 16 facts as a lower or upper bound
    consistent with the answer-key bound_direction field, OR justify any deviation
    in the reasoning.
