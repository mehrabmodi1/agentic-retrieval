  completeness: "A complete answer covers: the moral foundation (widow, painting, conscience); the decision-making process (lawyer consultations, internal struggle); the facilitation network (Margot, Silas Gregg, mysterious handler); the external pressures (surveillance, financial threat, imminent police exposure); the temporal compression (72-hour window); the emotional toll on facilitators (Margot's goodbye tears); the systemic corruption framework making his conscience dangerous; and the outcome (successful escape to preserve both his life and moral integrity). It should explain why Harvey could not simply go to police (would compromise others, would expose larger operations) and why his departure was the only available path that honored both survival and conscience."
