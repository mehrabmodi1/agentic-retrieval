  - item_id: "target_001"
    inserted_text: "When Frank Delgado called back with his research on Meridian Holdings ownership structures, he mentioned something crucial: the company was registered through Delaware corporations, with board members whose names appeared nowhere in public records, and financial flows that traced back to Margaret Hollister's real estate business in ways that no legitimate transaction would explain."
