expected_answers:
  question: "You are given 8 pieces of evidence from a homicide investigation, each\
    \ pertaining to events on the night of the murder. Some pieces establish that\
    \ the suspect was at large (free, unaccounted-for) at or after a specific time;\
    \ others establish that the suspect was off-the-streets (accounted-for, with an\
    \ alibi) at or before a specific time.\n\nBelow are the 8 pieces of evidence:\n\
    \n1. Mrs. Pavone, his landlady, watched him climb the stairs to his room at twenty\
    \ past ten and bolted the front door behind him; she said the lock had not been\
    \ turned again before morning.\n2. The Greek who runs the diner on Lex told me,\
    \ between bites of his own dinner, that Costa took the corner booth at half past\
    \ six and ordered nothing \u2014 just sat. He left after maybe twenty minutes.\n\
    3. Old Mrs. Halloran from across the hall swore on her late husband's grave that\
    \ Costa came up the stoop and slammed his door at six on the dot \u2014 she had\
    \ just put the kettle on and the radio was running the news.\n4. The desk sergeant\
    \ logged Costa's pickup at the precinct at five past nine \u2014 the suspect,\
    \ demonstrably, was no longer at large.\n5. Two patrolmen on the Grand-Central\
    \ beat said they tipped their caps to Costa as he came up out of the IRT \u2014\
    \ they fixed it at eight-thirty, give or take, because they had just turned the\
    \ corner past the cigar shop.\n6. The night porter on the eastbound Twentieth\
    \ Century swung Costa's bag aboard at eleven forty-five; he saw the man tucked\
    \ into the lower berth and drew the curtain himself.\n7. Mickey was last seen\
    \ alive \u2014 and very much alone \u2014 by the doorman at the Astor at half\
    \ past seven, the night of the killing.\n8. Eddie at the newsstand on Forty-Third\
    \ remembered selling Costa an evening Standard at a quarter past six \u2014 'He\
    \ paid in nickels, like always,' Eddie said, 'and walked off east toward the river.'\n\
    \nDerive the narrowest defensible time window during which the suspect was at\
    \ large on the night of the murder. Cite the specific pieces of evidence that\
    \ establish your window's lower and upper bounds. Justify your classification\
    \ of each piece of evidence's bound direction.\n"
  correctness: "The answer must derive the narrowest valid window. The lower endpoint\
    \ is established by the fact whose bound_direction is 'lower' and bound_value\
    \ is largest: 'Two patrolmen on the Grand-Central beat said they tipped their\
    \ caps to Costa as he came up out of the IRT \u2014 they fixed it at eight-thirty,\
    \ give or take, because they had just turned the corner past the cigar shop.'\
    \ (value: 8:30 PM). The upper endpoint is established by the fact whose bound_direction\
    \ is 'upper' and bound_value is smallest: \"The desk sergeant logged Costa's pickup\
    \ at the precinct at five past nine \u2014 the suspect, demonstrably, was no longer\
    \ at large.\" (value: 9:05 PM). The agent must cite both facts."
  completeness: The agent must classify each of the 8 facts as a lower or upper bound
    consistent with the answer-key bound_direction field, OR justify any deviation
    in the reasoning.
