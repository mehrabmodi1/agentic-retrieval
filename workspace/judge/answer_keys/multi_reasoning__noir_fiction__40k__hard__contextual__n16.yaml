    line_range: [35, 41]
    context_summary: "Identifies the specific date and nature of the order for Claire's elimination"

  - item_id: "target_006"
    inserted_text: "The first offer came in on July 14th—two million dollars for the entire operation. I laughed. It was insulting. By August 9th, they'd raised it to five million. By September 1st, they were at eight million. And then Catherine disappeared on September 17th, and I understood that the acquisition wasn't about business. It was about leverage."
    file_path: "chapters/chapter_05.md"
    line_range: [43, 48]
    context_summary: "Establishes the escalating acquisition timeline and connection to Catherine's kidnapping"

  - item_id: "target_007"
    inserted_text: "They needed control of my company's financial infrastructure, its account access, its movement capabilities. They knew I could move money quietly and quickly, and they wanted to use me to do it for them."
    file_path: "chapters/chapter_05.md"
    line_range: [49, 52]
    context_summary: "Reveals why the criminal organization specifically targeted Halstead Industries"

  - item_id: "target_008"
    inserted_text: "As of 3:45 PM this afternoon, I filed the official report with the FBI. Catherine Halstead is now a federal case, and anything you do from this point forward is interference with a federal investigation."
