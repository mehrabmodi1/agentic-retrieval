  - item_id: "target_004"
    inserted_text: "Mercer received his diagnosis exactly six days ago—terminal cancer, six months at most. The doctors told him on Wednesday afternoon at Saint Michael's Hospital, during a routine checkup that revealed metastatic spread to his liver and lungs."
