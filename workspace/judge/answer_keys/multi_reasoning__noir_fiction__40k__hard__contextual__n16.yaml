  - item_id: "target_005"
    inserted_text: "Mercer will also testify that he was motivated by fear, not money, though he took the money too. And he'll testify that he prepared the legal cover for moving her body and disposing of evidence. On September 29th, Sinclair met with Mercer and two other operatives and explicitly ordered 'the elimination of the Castellano problem.' Mercer understood this to mean Claire, who had become a liability."
