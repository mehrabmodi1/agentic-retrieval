expected_answers:
  question: 'Across the entire codebase, identify all configuration constants that represent time-related thresholds or durations

    (regardless of their unit: seconds, milliseconds, minutes, or hours).


    For each time-related constant, convert its value to seconds and then sum all converted values.

    Note: Constants found via their NEEDLE_L* labeled comments.


    What is the total sum of all time-related configuration values when expressed in seconds?

    '
  correctness: 'A correct answer must:

    1. Identify REQUEST_TIMEOUT_SECONDS = 30 (30 seconds)

    2. Identify SLOW_REQUEST_THRESHOLD_MS = 1000 (1 second when converted)

    3. Identify CORS_MAX_AGE_SECONDS = 3600 (3600 seconds)

    4. Identify STALE_LOCK_TIMEOUT_SECONDS = 60 (60 seconds)

    5. Identify POLL_INTERVAL_SECONDS = 5 (5 seconds)

    6. Identify CACHE_DURATION_SECONDS = 300 (300 seconds)

    7. Identify SESSION_TIMEOUT_MINUTES = 30 (1800 seconds when converted from 30 minutes)

    8. Identify PASSWORD_RESET_EXPIRES_HOURS = 24 (86400 seconds when converted from 24 hours)

    9. Calculate the correct sum: 30 + 1 + 3600 + 60 + 5 + 300 + 1800 + 86400 = 92,196 seconds

    '
  completeness: 'A complete answer covers:

    1. All 8 time-related configuration constants from the codebase

    2. Correct identification of units (seconds, milliseconds, minutes, hours) for each constant

    3. Proper conversion of all time values to seconds (1000 ms = 1 sec, 30 min = 1800 sec, 24 hr = 86400 sec)

    4. Accurate arithmetic to sum all converted values

    5. Final answer of 92196 seconds

    6. Reasoning showing how each constant was located and converted

    '
