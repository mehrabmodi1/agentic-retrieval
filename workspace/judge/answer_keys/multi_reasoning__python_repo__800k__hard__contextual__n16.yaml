expected_answers:
  question: 'Analyze the system''s task retry mechanism in the context of production constraints.

    Given that the system processes email tasks with a maximum of 5 retry attempts using exponential backoff

    with a 2-second base delay and 10% jitter applied, a rate limiter capped at 10 requests per second,

    pagination limited to 100 items per page, session timeouts of 60 minutes, task execution timeouts of

    30 seconds, daily cleanup cycles of 1440 minutes, and JWT tokens expiring every 86400 seconds:


    What is the theoretical maximum cumulative delay in seconds across all retry attempts for a single

    failed task, accounting for exponential backoff but excluding jitter randomness? Also explain how

    this maximum delay compares to the task execution timeout constraint and the session timeout window,

    then identify which system configuration parameters (rate limiting, pagination, cleanup frequency,

    retention windows) would need coordination to prevent cascading failures when retrying failed operations

    at the rate limiter''s maximum throughput.

    '
  correctness: "A correct answer must:\n1. Calculate exponential backoff delays: 2^1=2, 2^2=4, 2^3=8, 2^4=16, 2^5=32 seconds per attempt\n2. Sum delays (excluding attempt 0): 2 + 4 + 8 + 16 + 32 = 62 seconds maximum\n3. Verify this fits within the 30-second task timeout (noting the conflict)\n4. Compare against 60-minute (3600-second) session timeout window\n5. Note the rate limiter allows 10 requests/second = 100 requests per 10-second window\n6. Identify pagination (100 items) and batch limits (1000 records) as relevant to query scaling\n7. Recognize that 90-day audit retention + 30-day report retention + daily 1440-minute cleanup\n   create a maintenance schedule that must not block retry operations\n8. Note that 401 unauthorized status code requires token validation against 24-hour expiration window\n"
  completeness: "A complete answer covers:\n- The specific exponential backoff formula and calculated delays for all 5 retry attempts\n- The mathematical sum of cumulative delay (62 seconds without jitter)\n- Comparison of this delay to the 30-second task execution timeout (identifying a constraint violation)\n- Analysis of how the 60-minute session timeout provides a broader window\n- The rate limiter's throughput (10 req/sec) and its implications for retry queue processing\n- The interaction between pagination limits (100 items) and batch query limits (1000 records)\n- The maintenance windows (daily cleanup at 1440 minutes) and retention periods (90 days audit, 30 days reports)\n- Token expiration (86400 seconds) and its interaction with session timeout (3600 seconds)\n- Identification of which parameters constrain each other (compression threshold 1024 bytes affects payload size,\n  which affects pagination effectiveness)\n- Recommendations for coordinating these parameters to prevent\
    \ cascading failures\n"
