items:
  - item_id: "target_001"
    inserted_text: "Frank—I need something specific. Meridian Holdings will have a Delaware incorporation. Find the registered agent filing. There's a P.O. box they're using for filings. Box 847. That's where the real ownership information is hidden."
    file_path: "chapters/chapter_02.md"
