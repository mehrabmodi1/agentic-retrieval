expected_answers:
  question: If an API enforces a 60-second rate limit recovery window, tasks are retried with exponential backoff starting at 10 seconds per attempt (doubling each retry), a maximum of 3 retries are allowed, each API request has a 30-second timeout, and the system deletes files older than 90 days, what is the minimum total elapsed time (in seconds) for a rate-limited task to exhaust all retry attempts assuming each attempt takes the full timeout?
  correctness: 'The answer must calculate:

    1. Initial rate limit wait: 60 seconds

    2. First attempt timeout: 30 seconds

    3. First retry delay: 10 * 2^0 = 10 seconds

    4. Second attempt timeout: 30 seconds

    5. Second retry delay: 10 * 2^1 = 20 seconds

    6. Third attempt timeout: 30 seconds

    7. Third retry delay: 10 * 2^2 = 40 seconds

    8. Fourth (final) attempt timeout: 30 seconds

    Total: 60 + 30 + 10 + 30 + 20 + 30 + 40 + 30 = 250 seconds

    '
  completeness: 'A complete answer must:

    - Identify the 60-second rate limit recovery period

    - Recognize the exponential backoff formula (10 * 2^(attempt-1))

    - Count all 4 attempts (initial + 3 retries within max_retries=3)

    - Include all 30-second timeouts (one per attempt)

    - Sum the delays between retries

    - Provide the total in seconds

    - Optionally note that 90-day retention and password requirements provide additional context about system durability and security but don''t affect the calculation directly

    '
