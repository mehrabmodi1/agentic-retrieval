expected_answers:
  question: A system processes user tasks with retry logic, generates reports via background workers, and maintains multiple caches and cleanup schedules. If worker threads process tasks in batches, apply rate limiting to API requests, enforce pagination limits, expire authentication tokens, constrain report generation to maximum rows, apply exponential backoff retry delays, and maintain data retention windows for cleanup, what are the numerical constraints (limits, timeouts, batch sizes, retry counts, and retention periods) across the system that would impact maximum throughput, memory usage, and operational reliability?
  correctness: 'Answer must identify and synthesize at least 12 of the 16 embedded operational constraints: worker batch size (8), API rate limit (10,000), pagination max (100), default page size (20), report max rows (50,000), log retention days (90), token expiry hours (1), retry attempts (3), retry initial delay (1 second), pipeline timeout (83 seconds), email stale threshold (45 days), pagination cache TTL (341 seconds), sync batch size (100), default worker pool (5), email max length (254), and user serializer field count (15)'
  completeness: 'Complete answer should synthesize findings across all system layers: API middleware (pagination), route handlers (defaults), authentication (token expiry), background workers (retry policy, cleanup, report generation, sync operations), database models (defaults), rate limiting (timeouts), caching (TTL), and serialization (field counts) to demonstrate understanding of how these distributed constraints collectively affect system capacity and data freshness'
