experiment_type: "multi_reasoning"

# Generation-only sibling of multi_reasoning.yaml — densifies the n_items axis
# at 40k corpus size, easy + synonym, python_repo only. Runs are driven by
# batch YAMLs that declare a `grid:` block directly (no template lookup at
# runtime). n=8 is included for self-documentation; the generator skips it
# idempotently because its answer key already exists.

payload:
  item_type: "fact"

question_examples:
  python_repo:
    easy_exact:
      question: "Of the three cache layers (L1_CACHE_SIZE_MB, L2_CACHE_SIZE_MB, L3_CACHE_SIZE_MB), which is the largest, which is the smallest, and what is the ratio of largest-to-smallest?"
      items:
        - needle: "L1_CACHE_SIZE_MB = 512"
          file_context: "cache/l1_config.md"
        - needle: "L2_CACHE_SIZE_MB = 2048"
          file_context: "cache/l2_config.md"
        - needle: "L3_CACHE_SIZE_MB = 8192"
          file_context: "cache/l3_config.md"
      answer: "L3 is largest (8192 MB), L1 is smallest (512 MB), ratio is 16:1"
    hard_contextual:
      question: "Given WORKER_THREADS, CONNS_PER_WORKER, and REPLICA_FACTOR, will the system stay under MAX_CONNECTIONS_PER_NODE = 50? Identify which of the three is the bottleneck factor and explain how shrinking it by one would change peak concurrent connections."
      items:
        - needle: "WORKER_THREADS = 8"
          file_context: "server/config.md"
        - needle: "# each worker holds a connection for the duration of the transaction\nCONNS_PER_WORKER = 3  # read, write, advisory lock"
          file_context: "db/pool.md"
        - needle: "REPLICA_FACTOR = 2  # each write is mirrored"
          file_context: "db/replication.md"
      answer: "Peak is 8 x 3 x 2 = 48, just under 50. WORKER_THREADS is the bottleneck (largest factor); reducing it by one drops peak to 7 x 3 x 2 = 42 (-6). The other factors only drop peak by -16 or -24 each, exceeding what the safety margin needs."

grid:
  content_profile: [python_repo]
  corpus_token_count: [40000]
  discriminability: [easy]
  reference_clarity: [synonym]
  n_items: [4, 6, 8, 10, 12, 14]

rubric_criteria:
  - criterion: "correctness"
    weight: 1.0
  - criterion: "completeness"
    weight: 0.5
