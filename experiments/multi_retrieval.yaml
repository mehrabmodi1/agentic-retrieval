experiment_type: "multi_retrieval"

payload:
  item_type: "fact"

question_examples:
  python_repo:
    hard_contextual:
      question: |
        I have added N={n} numeric tuning parameters to this codebase that govern a canary deployment / progressive rollout system. Find each one and report it as `<verbatim line of code> — value: <numeric value>`. Report all {n}.
      answer: "List of {n} canary parameters with values"
  noir_fiction:
    hard_contextual:
      question: |
        I have added N={n} passages to this story that fix a specific time on the night before the murder. Find each one and report it as `<verbatim passage text> — time referenced: <e.g., 9:45 PM>`. Report all {n}.
      answer: "List of {n} timing passages with times"

rubric_criteria:
  - criterion: "recall"
    weight: 1.0
  - criterion: "precision"
    weight: 0.3

grid:
  content_profile: [python_repo, noir_fiction]
  corpus_token_count: [800000]
  discriminability: [hard]
  reference_clarity: [contextual]
  n_items: [2, 4, 8, 12, 16]

fixed_pool:
  python_repo:
    - inserted_text: "CANARY_TRAFFIC_PCT = 5  # initial share of requests routed to the new build"
      value: "5"
      content_hint: "Lives in the deployment package's traffic-routing config, alongside load-balancer weights."
    - inserted_text: "evaluation_window_minutes = 30  # how long we observe metrics before promoting"
      value: "30"
      content_hint: "Belongs in the release-controller module that watches metrics during a canary."
    - inserted_text: "REGRESSION_P99_MULTIPLIER = 1.25  # abort if canary p99 latency exceeds baseline by this factor"
      value: "1.25"
      content_hint: "Threshold lives in the SLO-comparison helpers used by the canary judge."
    - inserted_text: "auto_rollback_error_rate = 0.02  # error fraction that triggers an immediate rollback"
      value: "0.02"
      content_hint: "Sits in the safety-controller config next to other circuit-breaker thresholds."
    - inserted_text: "MAX_BLAST_RADIUS_HOSTS = 12  # cap on hosts ever exposed to a failing build"
      value: "12"
      content_hint: "Lives in the fleet-orchestrator's safety limits, near concurrency caps."
    - inserted_text: "synthetic_probe_ratio = 0.15  # fraction of canary traffic that is synthetic"
      value: "0.15"
      content_hint: "Used by the traffic-shaper that mixes real and replayed requests into the canary."
    - inserted_text: "exposure_ramp_steps = [1, 5, 10, 25, 50, 100]  # percent of users at each ramp stage"
      value: "[1, 5, 10, 25, 50, 100]"
      content_hint: "Lives in the progressive-delivery scheduler that walks rollout through stages."
    - inserted_text: "holdback_group_pct = 1.0  # users permanently kept on the old build for A/B comparison"
      value: "1.0"
      content_hint: "Belongs in the feature-flag service config, alongside cohort definitions."
    - inserted_text: "abort_cooldown_seconds = 900  # minimum gap between an abort and the next retry"
      value: "900"
      content_hint: "Used by the deploy state-machine to throttle retries after a failed canary."
    - inserted_text: "DRIFT_TOLERANCE_SIGMA = 3.0  # std-deviations of metric drift tolerated before alarm"
      value: "3.0"
      content_hint: "Lives in the metric-drift detector that compares canary distributions to baseline."
    - inserted_text: "min_probe_success_ratio = 0.995  # canary judged unhealthy below this synthetic-probe pass rate"
      value: "0.995"
      content_hint: "Threshold lives in the probe-evaluator that scores synthetic checks."
    - inserted_text: "health_check_interval_seconds = 10  # cadence of canary health polling"
      value: "10"
      content_hint: "Belongs in the canary-monitor loop, controlling how often health endpoints are scraped."
    - inserted_text: "prod_promote_delay_seconds = 600  # mandatory soak after canary passes before full prod rollout"
      value: "600"
      content_hint: "Used by the promotion controller to force a quiet period between canary and prod."
    - inserted_text: "FLAG_EXPOSURE_INCREMENT = 0.10  # fraction added to a feature flag per ramp tick"
      value: "0.10"
      content_hint: "Lives in the feature-flag rollout scheduler, separate from hard traffic splits."
    - inserted_text: "stability_hold_duration_minutes = 45  # how long metrics must remain green before promotion"
      value: "45"
      content_hint: "Used by the stability-watcher that gates the promote step on sustained healthy windows."
    - inserted_text: "approval_gate_timeout_hours = 4  # human-approval window before a canary auto-aborts"
      value: "4"
      content_hint: "Lives in the release-pipeline config alongside other gate timeouts."
  noir_fiction:
    - inserted_text: |-
        Sully the deli owner remembered him fine. The radio was just rolling into the six o'clock news when Carney came in for a pack of Luckies and a copy of the evening paper. "I know it was six because Mr. Whittaker reads the headlines on the dot," Sully said. The day before he was found in the alley.
      value: "6:00 PM"
      content_hint: "Witness statement chapter, voice of a deli owner anchoring the time by a radio newscast."
    - inserted_text: |-
        From the case-file note, dated the eve of the killing: Subject sighted entering the Belmont Hotel lobby at six-thirty in the evening; the lobby clock chimed once for the half-hour as he crossed to the elevators (per doorman Ed Ruskin).
      value: "6:30 PM"
